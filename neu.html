<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Neu Anlegen</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0f1117;
    color: white;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 40px;
    border-radius: 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

input, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #111318;
    color: white;
}

.full {
    grid-column: span 2;
}

.bottom {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
}

.btn {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.save { background: #3b82f6; }
.cancel { background: #ef4444; }
</style>
</head>

<body>

<div class="container">

<h2>Neu Anlegen</h2>

<div class="grid">

<input id="ort" placeholder="Ort">
<input id="adresse" placeholder="Adresse">

<input id="fahrzeug" placeholder="Fahrzeug (z.B. HLF 20)">
<input id="lagerort" placeholder="Lagerort (z.B. G3, Regal A, Halle A)">

<input id="geraete" placeholder="Einsatzgerät">
<input id="beladung" placeholder="Beladung (z.B. Spreizer, Schneidgerät...)">
<input id="sonder" placeholder="Sondergerät">

<input id="telefon" placeholder="Telefonnummer">
<input id="funk" placeholder="Funkkenner">

<textarea id="bemerkung" class="full" placeholder="Bemerkung"></textarea>

</div>

<div class="bottom">

<div>
<label><input type="checkbox" id="einsatz"> Geräte</label><br>
<label><input type="checkbox" id="fahrzeuge"> Fahrzeuge</label>
</div>

<div>
<button class="btn save" onclick="save()">Speichern</button>
<button class="btn cancel" onclick="back()">Abbrechen</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ffwc-d3994.firebaseapp.com",
  databaseURL: "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "ffwc-d3994",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.save = function(){

    let data = {
        ort: ort.value,
        adresse: adresse.value,
        fahrzeug: fahrzeug.value,
        lagerort: lagerort.value,
        geraete: geraete.value,
        sonder: sonder.value,
        telefon: telefon.value,
        funk: funk.value,
        bemerkung: bemerkung.value
    };

    if(einsatz.checked){
        push(ref(db, "geraete"), data);
    }

    if(fahrzeuge.checked){
        push(ref(db, "fahrzeuge"), data);
    }

    alert("Gespeichert");
};

window.back = function(){
    window.location.href = "index.html";
};

</script>

</body>
</html>
