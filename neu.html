<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neu Anlegen</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
    max-width:1000px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2{
    margin-top:0;
    margin-bottom:30px;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

input,
textarea{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111318;
    color:white;
    font-size:15px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

.full{
    grid-column:span 2;
}

.previewBox{
    margin-top:10px;
    text-align:center;
}

#preview{
    max-width:100%;
    max-height:250px;
    border-radius:12px;
    display:none;
}

.bottom{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.types{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.types label{
    display:flex;
    align-items:center;
    gap:10px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.save{
    background:#2563eb;
}

.cancel{
    background:#ef4444;
}

.logout{
    background:#f59e0b;
}

.status{
    margin-top:20px;
    font-weight:bold;
    text-align:center;
}

@media(max-width:800px){

    .grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:span 1;
    }

    .bottom{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>

</head>

<body>

<div class="page">

<h2>Neu Anlegen</h2>

<div class="grid">

<input id="ort" placeholder="Ort">

<input id="adresse" placeholder="Adresse">

<input id="telefon" placeholder="Telefon">

<input id="fahrzeug" placeholder="Fahrzeug">

<input id="funk" placeholder="Funkkenner">

<input id="staerke" placeholder="Stärke">

<input id="geraete" placeholder="Gerät">

<input id="lagerort" placeholder="Lagerort (z.B. HLF G3 / Regal A)">

<textarea
id="beladung"
class="full"
placeholder="Beladung (für Suche wichtig)">
</textarea>

<textarea
id="bemerkung"
class="full"
placeholder="Bemerkung / Zusatzinformationen">
</textarea>

<input
type="file"
id="bild"
class="full"
accept="image/*">

<div class="previewBox full">
    <img id="preview">
</div>

</div>

<div class="bottom">

<div class="types">

<label>
<input type="checkbox" id="einsatz">
Geräte
</label>

<label>
<input type="checkbox" id="fahrzeuge">
Fahrzeuge
</label>

</div>

<div class="buttons">

<button class="save" onclick="save()">
Speichern
</button>

<button class="cancel" onclick="back()">
Zurück
</button>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

</div>

<div id="status" class="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
set,
get,
child
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

  apiKey: "AIzaSyDSYQZGiKbXjy9142dKq_4Upc9zfvekOHE",
  authDomain: "ffwc-d3994.firebaseapp.com",
  databaseURL: "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ffwc-d3994",
  storageBucket: "ffwc-d3994.firebasestorage.app",
  messagingSenderId: "591233232022",
  appId: "1:591233232022:web:66ce4e0349d426e94ae6b7",
  measurementId: "G-BG75M1KXHL"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);


/* LOGIN PRÜFUNG */

let authGeladen = false;

onAuthStateChanged(auth, (user) => {

authGeladen = true;

if(user){

console.log("✅ Eingeloggt:", user.email);

}else{

console.log("❌ Nicht eingeloggt");

window.location.href = "login.html";

}

});

/* LOGOUT */

window.logout = async function(){

await signOut(auth);

window.location.href = "login.html";

};


/* SPEICHERN */

window.speichern = async function(){

const fahrzeug = document.getElementById("fahrzeug").value;
const ort = document.getElementById("ort").value;
const adresse = document.getElementById("adresse").value;
const telefon = document.getElementById("telefon").value;
const email = document.getElementById("email").value;
const funk = document.getElementById("funk").value;
const staerke = document.getElementById("staerke").value;
const beladung = document.getElementById("beladung").value;

if(fahrzeug === ""){

alert("Bitte Fahrzeug eingeben");
return;

}

const neueRef = push(ref(db, "fahrzeuge"));

await set(neueRef, {

fahrzeug,
ort,
adresse,
telefon,
email,
funk,
staerke,
beladung,
erstelltAm: new Date().toISOString()

});

alert("Fahrzeug gespeichert");

document.getElementById("formular").reset();

};


/* ORTSVORSCHLÄGE */

async function ladeVorschlaege(){

const dbRef = ref(db);

const snapshot = await get(child(dbRef, "fahrzeuge"));

const ortListe = document.getElementById("orte");
const adressListe = document.getElementById("adressen");

const orte = new Set();
const adressen = new Set();

if(snapshot.exists()){

snapshot.forEach((child) => {

const daten = child.val();

if(daten.ort){

orte.add(daten.ort);

}

if(daten.adresse){

adressen.add(daten.adresse);

}

});

}

orte.forEach((ort) => {

const option = document.createElement("option");

option.value = ort;

ortListe.appendChild(option);

});

adressen.forEach((adresse) => {

const option = document.createElement("option");

option.value = adresse;

adressListe.appendChild(option);

});

}

ladeVorschlaege();

</script>

</head>

<body>

<div class="container">

<div class="topbar">

<h1>Neues Fahrzeug</h1>

<button class="btn-red logout-btn" onclick="logout()">
Logout
</button>

</div>


<div class="card">

<form id="formular">

<label>Fahrzeug</label>
<input type="text" id="fahrzeug" placeholder="z.B. Hilfeleistungslöschgruppenfahrzeug (HLF) 10">


<label>Ort</label>
<input list="orte" id="ort" placeholder="Ort eingeben">
<datalist id="orte"></datalist>


<label>Adresse</label>
<input list="adressen" id="adresse" placeholder="Straße eingeben">
<datalist id="adressen"></datalist>


<label>Telefonnummer</label>
<input type="text" id="telefon" placeholder="Telefonnummer">


<label>E-Mail Adresse</label>
<input type="email" id="email" placeholder="mail@beispiel.de">


<label>Funkrufname</label>
<input type="text" id="funk" placeholder="z.B. Florian Crimmitschau 11/44/1">


<label>Stärke</label>
<input type="text" id="staerke" placeholder="z.B. 1/8">


<label>Beladung</label>
<textarea id="beladung" rows="10" placeholder="Beladung eingeben"></textarea>


<button type="button" class="btn-green" onclick="speichern()">
Fahrzeug speichern
</button>

</form>

</div>

</div>

</body>
</html>
