<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Neu Anlegen</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: #0f1117;
    color: white; 
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 30px;
    border-radius: 15px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

input, textarea {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111318;
    color: white;
    width: 100%;
}

/* Fokus */
input:focus, textarea:focus {
    outline: 2px solid #3b82f6;
}

/* volle Breite */
.full {
    grid-column: span 2;
}

/* Bild */
.preview {
    margin-top: 10px;
    max-height: 120px;
    border-radius: 8px;
}

/* UNTERER BEREICH */
.bottom {
    margin-top: 30px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

/* Checkbox Bereich */
.left {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.checkline {
    display: flex;
    justify-content: space-between;
    width: 260px;
}

/* Buttons */
.right {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    width: 150px;
}

.save { background:#3b82f6; }
.cancel { background:#ef4444; }

</style>
</head>

<body>

<div class="container">

<h2>Neu Anlegen</h2>

<div class="grid">

<input id="ort" placeholder="Ort">
<input id="adresse" placeholder="Adresse">

<input id="telefon" placeholder="Telefon">
<input id="fahrzeug" placeholder="Fahrzeug">

<input id="funk" placeholder="Funkkenner">
<input id="staerke" placeholder="Stärke">

<input id="geraete" placeholder="Gerät">
<input id="lagerort" placeholder="Lagerort (z.B. HLF G3 / Regal A)">

<textarea id="beladung" class="full" placeholder="Beladung (für Suche wichtig!)"></textarea>
<textarea id="bemerkung" class="full" placeholder="Bemerkung"></textarea>

<input type="file" id="bild" class="full">
<img id="preview" class="preview">

</div>

<!-- UNTEN -->
<div class="bottom">

<div class="left">

<label class="checkline">
<span>Geräte</span>
<input type="checkbox" id="einsatz">
</label>

<label class="checkline">
<span>Fahrzeuge</span>
<input type="checkbox" id="fahrzeuge">
</label>

</div>

<div class="right">
<button class="save" onclick="save()">Speichern</button>
<button class="cancel" onclick="back()">Abbrechen</button>
</div>

</div>

</div>

<script type="module">

/* 🔒 LOGIN */
if(localStorage.getItem("login") !== "ok"){
    window.location.href = "login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);
const storage = getStorage(app);

/* Bild Vorschau */
bild.onchange = e=>{
    if(e.target.files[0]){
        preview.src = URL.createObjectURL(e.target.files[0]);
    }
};

/* 🔥 SPEICHERN */
window.save = async function(){

    /* 🔥 MINDEST CHECK */
    if(!ort.value){
        alert("Ort fehlt!");
        return;
    }

    if(!einsatz.checked && !fahrzeuge.checked){
        alert("Bitte auswählen: Gerät oder Fahrzeug");
        return;
    }

    let img = "";

    /* Bild Upload */
    if(bild.files[0]){
        let r = sRef(storage,"bilder/"+Date.now());
        await uploadBytes(r,bild.files[0]);
        img = await getDownloadURL(r);
    }

    let data = {
        ort: ort.value,
        adresse: adresse.value,
        telefon: telefon.value,

        fahrzeug: fahrzeug.value,
        funk: funk.value,
        staerke: staerke.value,

        geraete: geraete.value,
        lagerort: lagerort.value,

        beladung: beladung.value,
        bemerkung: bemerkung.value,

        bild: img,
        zeit: new Date().toLocaleString()
    };

    /* 🔥 SPEICHERN */
    if(einsatz.checked){
        await push(ref(db,"geraete"), data);
    }

    if(fahrzeuge.checked){
        await push(ref(db,"fahrzeuge"), data);
    }

    alert("Gespeichert!");

    /* 🔥 FELDER LEEREN */
    document.querySelectorAll("input, textarea").forEach(f=>{
        if(f.type !== "checkbox") f.value="";
    });

    einsatz.checked = false;
    fahrzeuge.checked = false;
    preview.src = "";
};

/* zurück */
window.back = ()=> location.href="index.html";

</script>

</body>
</html>
