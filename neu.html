<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Neu Anlegen</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: #0f1117;
    color: white;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 30px;
    border-radius: 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

input, textarea {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111318;
    color: white;
}

.full {
    grid-column: span 2;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.save { background:#3b82f6; }
.cancel { background:#ef4444; }

.bottom {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<div class="container">

<h2>Neu Anlegen</h2>

<div class="grid">

<input id="ort" placeholder="Ort">
<input id="adresse" placeholder="Adresse">

<input id="telefon" placeholder="Telefon">
<input id="fahrzeug" placeholder="Fahrzeug">

<input id="funk" placeholder="Funkkenner">
<input id="staerke" placeholder="Stärke">

<input id="geraete" placeholder="Gerät">
<input id="lagerort" placeholder="Lagerort (z.B. HLF G3 / Regal A)">

<textarea id="beladung" class="full" placeholder="Beladung (wichtig für Suche!)"></textarea>
<textarea id="bemerkung" class="full" placeholder="Bemerkung (Zusatzinformation!)"></textarea>

<input type="file" id="bild" class="full">
<img id="preview" style="max-height:120px">

</div>

<div class="bottom">

<div>
<label><input type="checkbox" id="einsatz"> Geräte</label><br>
<label><input type="checkbox" id="fahrzeuge"> Fahrzeuge</label>
</div>

<div>
<button class="save" onclick="save()">Speichern</button>
<button class="cancel" onclick="back()">Abbrechen</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);
const storage = getStorage(app);

bild.onchange = e=>{
    preview.src = URL.createObjectURL(e.target.files[0]);
};

window.save = async function(){

    let img="";
    if(bild.files[0]){
        let r = sRef(storage,"bilder/"+Date.now());
        await uploadBytes(r,bild.files[0]);
        img = await getDownloadURL(r);
    }

    let data = {
        ort: ort.value,
        adresse: adresse.value,
        telefon: telefon.value,
        fahrzeug: fahrzeug.value,
        funk: funk.value,
        staerke: staerke.value,
        geraete: geraete.value,
        lagerort: lagerort.value,
        beladung: beladung.value,
        bild: img
    };

    if(einsatz.checked){
        push(ref(db,"geraete"), data);
    }

    if(fahrzeuge.checked){
        push(ref(db,"fahrzeuge"), data);
    }

    alert("Gespeichert!");
};

window.back = ()=> location.href="index.html";

</script>

</body>
</html>
