<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Neu Anlegen</title>

<style>

/* Hintergrund */
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0f1117;
    color: white;
}

/* Fenster */
.container {
    max-width: 900px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* Titel */
h2 {
    margin-bottom: 25px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 40px;
    row-gap: 20px;
}

/* Felder */
input, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #111318;
    color: white;
}

/* Fokus */
input:focus, textarea:focus {
    outline: 2px solid #3b82f6;
}

/* volle Breite */
.full {
    grid-column: span 2;
}

/* Bild */
.preview {
    margin-top: 10px;
    max-height: 120px;
    border-radius: 8px;
}

/* ===== UNTEN ===== */
.bottom-area {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
}

/* LINKS */
.left-side {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Checkbox */
.checkline {
    display: flex;
    justify-content: space-between;
    width: 300px;
}

/* RECHTS */
.right-side {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Buttons */
.btn {
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    width: 160px;
}

.save { background: #3b82f6; }
.cancel { background: #ef4444; }

</style>
</head>
<body>

<div class="container">

<h2>Neu Anlegen</h2>

<div class="grid">

<input id="ort" placeholder="Ort / Ortsteil">
<input id="fahrzeug" placeholder="Fahrzeug">

<input id="funk" placeholder="Funkkenner">
<input id="staerke" placeholder="Stärke">

<input id="geraete" placeholder="Einsatzgeräte">
<input id="sonder" placeholder="Sondergeräte">

<!-- NEU -->
<input id="telefon" placeholder="Telefonnummer">
<input id="lagerort" placeholder="Standort / Verlastung (z.B. HLF G3 / Regal A / Anhänger)">

<textarea id="bemerkung" class="full" placeholder="Bemerkung / Adresse"></textarea>

<div class="full">
    <input type="file" id="bild">
    <img id="preview" class="preview">
</div>

</div>

<div class="bottom-area">

<div class="left-side">
    <label class="checkline">
        <span>Einsatz-/Sondergeräte</span>
        <input type="checkbox" id="einsatz">
    </label>

    <label class="checkline">
        <span>Fahrzeuge/Anhänger</span>
        <input type="checkbox" id="fahrzeuge">
    </label>
</div>

<div class="right-side">
    <button class="btn save" onclick="save()">Speichern</button>
    <button class="btn cancel" onclick="back()">Abbrechen</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ffwc-d3994.firebaseapp.com",
  databaseURL: "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "ffwc-d3994",
  storageBucket: "ffwc-d3994.appspot.com",
  messagingSenderId: "591233232022",
  appId: "1:591233232022:web:66ce4e0349d426e94ae6b7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

bild.onchange = e => {
    const file = e.target.files[0];
    if(file){
        preview.src = URL.createObjectURL(file);
    }
};

window.save = async function(){

    let file = bild.files[0];
    let imageUrl = "";

    if(file){
        let storageRef = sRef(storage, "bilder/" + Date.now());
        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
    }

    let data = {
        ort: ort.value,
        fahrzeug: fahrzeug.value,
        funk: funk.value,
        staerke: staerke.value,
        geraete: geraete.value,
        sonder: sonder.value,
        telefon: telefon.value,
        lagerort: lagerort.value,
        bemerkung: bemerkung.value,
        bild: imageUrl,
        zeit: new Date().toLocaleString()
    };

    if(einsatz.checked){
        push(ref(db, "geraete"), data);
    }

    if(fahrzeuge.checked){
        push(ref(db, "fahrzeuge"), data);
    }

    alert("Gespeichert!");
};

window.back = () => window.location.href = "index.html";

</script>

</body>
</html>
