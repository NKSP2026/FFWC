<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neu Anlegen</title>

<style>

body{
    margin:0;
    font-family:"Segoe UI";
    background:#0f1117;
    color:white;
    overflow-y:auto;
}

.container{
    max-width:1000px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2{
    margin-top:0;
    margin-bottom:25px;
    color:#6ea8ff;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

input,
textarea{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111318;
    color:white;
    font-size:15px;
}

input::placeholder,
textarea::placeholder{
    color:#9ca3af;
}

textarea{
    min-height:140px;
    resize:vertical;
}

.full{
    grid-column:span 2;
}

button{
    padding:14px 18px;
    border-radius:12px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    color:white;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.save{
    background:#2563eb;
}

.cancel{
    background:#ef4444;
}

.bottom{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
}

#preview{
    max-height:180px;
    border-radius:12px;
    display:none;
}

.status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

@media(max-width:850px){

    .grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:span 1;
    }

}

</style>

</head>

<body>

<div class="container">

<h2>Neu Anlegen</h2>

<div class="grid">

<input
id="ort"
list="orte"
placeholder="Ort">

<datalist id="orte"></datalist>

<input
id="adresse"
list="adressen"
placeholder="Adresse">

<datalist id="adressen"></datalist>

<input
id="telefon"
list="telefone"
placeholder="Telefonnummer">

<datalist id="telefone"></datalist>

<input
id="email"
list="emails"
type="email"
placeholder="E-Mail Adresse">

<datalist id="emails"></datalist>

<input
id="fahrzeug"
placeholder="Fahrzeug">

<input
id="funk"
placeholder="Funkkenner">

<input
id="staerke"
placeholder="Stärke">

<input
id="geraete"
placeholder="Gerät">

<input
id="lagerort"
list="lagerorte"
placeholder="Lagerort">

<datalist id="lagerorte"></datalist>

<textarea
id="beladung"
class="full"
placeholder="Beladung (wichtig für Suche!)">
</textarea>

<textarea
id="bemerkung"
class="full"
placeholder="Bemerkung">
</textarea>

<input
type="file"
id="bild"
class="full"
accept="image/*">

<div class="full">

<img id="preview">

</div>

</div>

<div class="bottom">

<div>

<label>
<input type="checkbox" id="einsatz">
Geräte
</label>

<br><br>

<label>
<input type="checkbox" id="fahrzeuge">
Fahrzeuge
</label>

</div>

<div>

<button
class="save"
onclick="save()">

Speichern

</button>

<button
class="cancel"
onclick="back()">

Abbrechen

</button>

</div>

</div>

<div class="status" id="status"></div>

</div>


<script type="module">

/* ZENTRALES FIREBASE SYSTEM */
import "./firebase.js";

const {
    db,
    storage,
    ref,
    push,
    set,
    get,
    child,
    storageRef,
    uploadBytes,
    getDownloadURL
} = window;
/* =========================================
   BILD VORSCHAU
========================================= */

bild.onchange = e=>{

    if(!e.target.files[0]) return;

    preview.src =
        URL.createObjectURL(
            e.target.files[0]
        );

    preview.style.display = "block";

};

/* =========================================
   SPEICHERN
========================================= */

window.save = async function(){

    try{

       document.getElementById("status").innerHTML =
            "Speichere...";

        /* PRÜFUNG */
        if(
            !einsatz.checked &&
            !fahrzeuge.checked
        ){

            alert(
                "Bitte Geräte oder Fahrzeuge auswählen"
            );

            document.getElementById("status").innerHTML =
                "❌ Keine Kategorie ausgewählt";

            return;
        }

        let img = "";

        /* =========================================
           BILD UPLOAD
        ========================================= */

        if(bild.files[0]){

            let r = storageRef(
                storage,
                "bilder/" + Date.now()
            );

            await uploadBytes(
                r,
                bild.files[0]
            );

            img =
                await getDownloadURL(r);

        }

        /* =========================================
           DATEN
        ========================================= */

        let data = {

            ort:
                ort.value || "",

            adresse:
                adresse.value || "",

            telefon:
                telefon.value || "",

            email:
                email.value || "",

            fahrzeug:
                fahrzeug.value || "",

            funk:
                funk.value || "",

            staerke:
                staerke.value || "",

            geraete:
                geraete.value || "",

            lagerort:
                lagerort.value || "",

            beladung:
                beladung.value || "",

            bemerkung:
                bemerkung.value || "",

            bild:
                img || "",

            erstelltAm:
                new Date().toISOString()

        };

        /* =========================================
           GERÄTE SPEICHERN
        ========================================= */

        if(einsatz.checked){

            const newRef =
                push(
                    ref(db,"geraete")
                );

            await set(
                newRef,
                data
            );

        }

        /* =========================================
           FAHRZEUGE SPEICHERN
        ========================================= */

        if(fahrzeuge.checked){

            const newRef =
                push(
                    ref(db,"fahrzeuge")
                );

            await set(
                newRef,
                data
            );

        }

       document.getElementById("status").innerHTML =
            "✅ Erfolgreich gespeichert";

        alert("Gespeichert");

        /* FORMULAR LEEREN */
        document.querySelector("form")?.reset();

        preview.style.display = "none";

    }catch(error){

        console.error(error);

        document.getElementById("status").innerHTML =
            "❌ Fehler beim Speichern";

        alert(
            "Fehler: " + error.message
        );

    }

};

/* =========================================
   ZURÜCK
========================================= */

window.back = ()=>{

    location.href = "index.html";

};

/* =========================================
   VORSCHLÄGE LADEN
========================================= */

async function ladeVorschlaege(){

    try{

        const dbRef = ref(db);

        const snapshot =
            await get(
                child(
                    dbRef,
                    "fahrzeuge"
                )
            );

        if(!snapshot.exists()) return;

        const ortSet =
            new Set();

        const adrSet =
            new Set();

        const telSet =
            new Set();

        const lagerSet =
            new Set();

        const mailSet =
            new Set();

        snapshot.forEach((c)=>{

            const d = c.val();

            if(d.ort){

                ortSet.add(d.ort);

            }

            if(d.adresse){

                adrSet.add(d.adresse);

            }

            if(d.telefon){

                telSet.add(d.telefon);

            }

            if(d.lagerort){

                lagerSet.add(d.lagerort);

            }

            if(d.email){

                mailSet.add(d.email);

            }

        });

        /* ORTE */
        ortSet.forEach(o=>{

            orte.innerHTML +=
                `<option value="${o}">`;

        });

        /* ADRESSEN */
        adrSet.forEach(a=>{

            adressen.innerHTML +=
                `<option value="${a}">`;

        });

        /* TELEFON */
        telSet.forEach(t=>{

            telefone.innerHTML +=
                `<option value="${t}">`;

        });

        /* LAGERORTE */
        lagerSet.forEach(l=>{

            lagerorte.innerHTML +=
                `<option value="${l}">`;

        });

        /* EMAILS */
        mailSet.forEach(m=>{

            emails.innerHTML +=
                `<option value="${m}">`;

        });

    }catch(error){

        console.error(
            "Vorschlag Fehler:",
            error
        );

    }

}

ladeVorschlaege();

</script>
