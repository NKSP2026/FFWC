<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Neu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Neu Anlegen</h2>

<input id="ort" placeholder="Ort"><br>
<input id="fahrzeug" placeholder="Fahrzeug"><br>
<input id="funk" placeholder="Funkkenner"><br>
<input id="geraete" placeholder="Geräte"><br>
<textarea id="bemerkung" placeholder="Bemerkung"></textarea><br>

<button onclick="save()">Speichern</button>

<script type="module">
import "./firebase.js";

window.save = function(){
    const data = {
        ort: ort.value,
        fahrzeug: fahrzeug.value,
        funk: funk.value,
        geraete: geraete.value,
        bemerkung: bemerkung.value
    };

    push(ref(db,"daten"), data);
    alert("Gespeichert");
}
</script>

</body>
</html>
