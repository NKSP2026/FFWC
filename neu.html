<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Neu Anlegen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Neu Anlegen</h1>

<div class="form-grid">

    <div>
        <label>Ort / Ortsteil</label>
        <input id="ort">
    </div>

    <div>
        <label>Fahrzeug</label>
        <input id="fahrzeug">
    </div>

    <div>
        <label>Funkkenner</label>
        <input id="funk">
    </div>

    <div>
        <label>Stärke</label>
        <input id="staerke">
    </div>

    <div>
        <label>Einsatzgeräte</label>
        <input id="geraete">
    </div>

    <div>
        <label>Sondergeräte</label>
        <input id="sonder">
    </div>

</div>

<label>Bemerkung / Adresse</label>
<textarea id="bemerkung"></textarea>

<br><br>

<label><input type="checkbox"> Einsatz-/Sondergeräte</label><br>
<label><input type="checkbox"> Fahrzeuge/ Anhänger</label>

<br><br>

<button>Speichern</button>
<button onclick="window.history.back()">Abbrechen</button>

</body>
</html>
