<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neu Anlegen</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
    max-width:1000px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2{
    margin-top:0;
    margin-bottom:30px;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

input,
textarea{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111318;
    color:white;
    font-size:15px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

.full{
    grid-column:span 2;
}

.previewBox{
    margin-top:10px;
    text-align:center;
}

#preview{
    max-width:100%;
    max-height:250px;
    border-radius:12px;
    display:none;
}

.bottom{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.types{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.types label{
    display:flex;
    align-items:center;
    gap:10px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.save{
    background:#2563eb;
}

.cancel{
    background:#ef4444;
}

.logout{
    background:#f59e0b;
}

.status{
    margin-top:20px;
    font-weight:bold;
    text-align:center;
}

@media(max-width:800px){

    .grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:span 1;
    }

    .bottom{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>

</head>

<body>

<div class="page">

<h2>Neu Anlegen</h2>

<div class="grid">

<input id="ort" placeholder="Ort">

<input id="adresse" placeholder="Adresse">

<input id="telefon" placeholder="Telefon">

<input id="fahrzeug" placeholder="Fahrzeug">

<input id="funk" placeholder="Funkkenner">

<input id="staerke" placeholder="Stärke">

<input id="geraete" placeholder="Gerät">

<input id="lagerort" placeholder="Lagerort (z.B. HLF G3 / Regal A)">

<textarea
id="beladung"
class="full"
placeholder="Beladung (für Suche wichtig)">
</textarea>

<textarea
id="bemerkung"
class="full"
placeholder="Bemerkung / Zusatzinformationen">
</textarea>

<input
type="file"
id="bild"
class="full"
accept="image/*">

<div class="previewBox full">
    <img id="preview">
</div>

</div>

<div class="bottom">

<div class="types">

<label>
<input type="checkbox" id="einsatz">
Geräte
</label>

<label>
<input type="checkbox" id="fahrzeuge">
Fahrzeuge
</label>

</div>

<div class="buttons">

<button class="save" onclick="save()">
Speichern
</button>

<button class="cancel" onclick="back()">
Zurück
</button>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

</div>

<div id="status" class="status"></div>

</div>

<script type="module">

/* ZENTRALES FIREBASE */
import "./firebase.js";

/* Bild Vorschau */
bild.onchange = e=>{

    let file = e.target.files[0];

    if(!file) return;

    preview.src = URL.createObjectURL(file);

    preview.style.display = "block";
};

/* Speichern */
window.save = async function(){

    try{

        status.innerHTML = "Speichere...";

        let imageUrl = "";

        /* Bild Upload */
        if(bild.files[0]){

            status.innerHTML = "Lade Bild hoch...";

            let file = bild.files[0];

            let path =
                "bilder/" +
                Date.now() +
                "_" +
                file.name;

            let imgRef =
                storageRef(storage,path);

            await uploadBytes(
                imgRef,
                file
            );

            imageUrl =
                await getDownloadURL(imgRef);
        }

        /* Daten */
        let data = {

            ort: ort.value || "",

            adresse: adresse.value || "",

            telefon: telefon.value || "",

            fahrzeug: fahrzeug.value || "",

            funk: funk.value || "",

            staerke: staerke.value || "",

            geraete: geraete.value || "",

            lagerort: lagerort.value || "",

            beladung: beladung.value || "",

            bemerkung: bemerkung.value || "",

            bild: imageUrl,

            erstelltAm:
                nowDate() + " " + nowTime(),

            timestamp: Date.now()
        };

        /* Geräte */
        if(einsatz.checked){

            await push(
                ref(db,"geraete"),
                data
            );
        }

        /* Fahrzeuge */
        if(fahrzeuge.checked){

            await push(
                ref(db,"fahrzeuge"),
                data
            );
        }

        status.innerHTML =
            "✅ Erfolgreich gespeichert";

        /* Formular leeren */
        clearForm();

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Speichern";

        alert(
            "Fehler beim Speichern:\n" +
            e.message
        );
    }

};

/* Formular leeren */
function clearForm(){

    [
        ort,
        adresse,
        telefon,
        fahrzeug,
        funk,
        staerke,
        geraete,
        lagerort,
        beladung,
        bemerkung
    ].forEach(f=>{
        f.value="";
    });

    einsatz.checked = false;
    fahrzeuge.checked = false;

    bild.value = "";

    preview.style.display = "none";
}

/* Zurück */
window.back = function(){

    location.href = "index.html";

};

</script>

</body>
</html>
