<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Geräte Suche</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
    max-width:1400px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
}

.top{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.searchBox input{
    width:100%;
    box-sizing:border-box;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#111318;
    color:white;
    font-size:16px;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 18px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.searchBtn{
    background:#2563eb;
}

.back{
    background:#6b7280;
}

.logout{
    background:#f59e0b;
}

.suggestions{
    background:#111318;
    border-radius:16px;
    min-height:300px;
    max-height:300px;
    overflow:auto;
    padding:10px;
}

.suggest{
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.suggest:hover{
    background:#1c1f26;
}

.status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.results{
    margin-top:35px;
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(350px,1fr));
    gap:25px;
}

.card{
    background:#111318;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-4px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:20px;
}

.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.line{
    margin-bottom:10px;
    line-height:1.5;
}

.phone{
    color:#60a5fa;
    text-decoration:none;
}

.phone:hover{
    text-decoration:underline;
}

.detail{
    margin-top:18px;
    background:#1c1f26;
    padding:15px;
    border-radius:14px;
    white-space:pre-wrap;
    line-height:1.6;
}

.highlight{
    color:#60a5fa;
    font-weight:bold;
}

.empty{
    text-align:center;
    padding:40px;
    font-size:18px;
}

@media(max-width:950px){

    .top{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="page">

<h2>Geräte Suche</h2>

<div class="top">

    <div class="searchBox">

        <input
        id="search"
        placeholder="Gerät oder Beladung suchen..."
        oninput="suggest()">

        <div class="buttons">

            <button
            class="searchBtn"
            onclick="doSearch()">

                Suchen

            </button>

            <button
            class="back"
            onclick="back()">

                Zurück

            </button>

            <button
            class="logout"
            onclick="logout()">

                Logout

            </button>

        </div>

    </div>

    <div
    id="suggestions"
    class="suggestions">
    </div>

</div>

<div id="status" class="status"></div>

<div id="results" class="results"></div>

</div>

<script type="module">

/* ZENTRALES FIREBASE */
import "./firebase.js";

let geraete = [];
let fahrzeuge = [];

/* Geräte laden */
onValue(ref(db,"geraete"), snap=>{

    geraete =
        Object.values(
            snap.val() || {}
        );

});

/* Fahrzeuge laden */
onValue(ref(db,"fahrzeuge"), snap=>{

    fahrzeuge =
        Object.values(
            snap.val() || {}
        );

    status.innerHTML =
        "✅ Daten geladen";

});

/* Vorschläge */
window.suggest = function(){

    let q =
        search.value
        .toLowerCase()
        .trim();

    suggestions.innerHTML = "";

    if(!q) return;

    let found = new Set();

    /* Geräte */
    geraete.forEach(g=>{

        if(
            g.geraete &&
            g.geraete
            .toLowerCase()
            .includes(q)
        ){

            found.add(g.geraete);

        }

    });

    /* Fahrzeuge */
    fahrzeuge.forEach(f=>{

        if(!f.beladung) return;

        f.beladung
        .split(",")

        .forEach(t=>{

            let name = t.trim();

            if(
                name
                .toLowerCase()
                .includes(q)
            ){

                found.add(name);

            }

        });

    });

    let count = 0;

    [...found]
    .sort()
    .forEach(name=>{

        if(count >= 15) return;

        let div =
            document.createElement("div");

        div.className = "suggest";

        div.innerHTML = name;

        div.onclick = ()=>{

            search.value = name;

            doSearch();

        };

        suggestions.appendChild(div);

        count++;

    });

};

/* Suche */
window.doSearch = function(){

    let q =
        search.value
        .toLowerCase()
        .trim();

    results.innerHTML = "";

    let found = 0;

    /* Geräte */
    geraete.forEach(g=>{

        if(
            g.geraete &&
            g.geraete
            .toLowerCase()
            .includes(q)
        ){

            found++;

            showGeraet(g);

        }

    });

    /* Fahrzeuge */
    fahrzeuge.forEach(f=>{

        if(
            f.beladung &&
            f.beladung
            .toLowerCase()
            .includes(q)
        ){

            found++;

            showFahrzeug(f,q);

        }

    });

    if(found === 0){

        results.innerHTML = `
            <div class="empty">
                Keine Treffer gefunden
            </div>
        `;

    }

};

/* Gerätekarte */
function showGeraet(g){

    let card =
        document.createElement("div");

    card.className = "card";

    card.innerHTML = `

        ${g.bild
            ? `<img src="${g.bild}">`
            : ""
        }

        <div class="content">

            <div class="title">
                ${g.geraete || "-"}
            </div>

            <div class="line">
                <b>Lagerort:</b>
                ${g.lagerort || "-"}
            </div>

            <div class="line">
                <b>Ort:</b>
                ${g.ort || "-"}
            </div>

            <div class="line">
                <b>Adresse:</b>
                ${g.adresse || "-"}
            </div>

            <div class="line">
                <b>Telefon:</b>

                ${
                    g.telefon
                    ? `
                    <a
                    class="phone"
                    href="tel:${g.telefon}">
                        ${g.telefon}
                    </a>
                    `
                    : "-"
                }

            </div>

        </div>

    `;

    results.appendChild(card);

}

/* Fahrzeugkarte */
function showFahrzeug(f,q){

    let beladung =
        highlight(
            f.beladung || "",
            q
        );

    let card =
        document.createElement("div");

    card.className = "card";

    card.innerHTML = `

        ${f.bild
            ? `<img src="${f.bild}">`
            : ""
        }

        <div class="content">

            <div class="title">
                ${f.fahrzeug || "-"}
            </div>

            <div class="line">
                <b>Ort:</b>
                ${f.ort || "-"}
            </div>

            <div class="line">
                <b>Adresse:</b>
                ${f.adresse || "-"}
            </div>

            <div class="line">
                <b>Telefon:</b>

                ${
                    f.telefon
                    ? `
                    <a
                    class="phone"
                    href="tel:${f.telefon}">
                        ${f.telefon}
                    </a>
                    `
                    : "-"
                }

            </div>

            <div class="detail">

                <b>Beladung:</b>
                <br><br>

                ${beladung}

            </div>

        </div>

    `;

    results.appendChild(card);

}

/* Highlight */
function highlight(text,q){

    return text.replace(
        new RegExp(q,"gi"),
        match => `
            <span class="highlight">
                ${match}
            </span>
        `
    );

}

/* ENTER */
search.addEventListener("keypress", e=>{

    if(e.key === "Enter"){

        doSearch();

    }

});

/* Zurück */
window.back = function(){

    location.href = "index.html";

};

</script>

</body>
</html>
