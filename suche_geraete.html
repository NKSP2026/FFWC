<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Geräte Suche</title>

<link rel="stylesheet" href="style.css">

<style>

/* ALLES */
*{
    box-sizing:border-box;

    -webkit-user-select:none;
    -ms-user-select:none;
    user-select:none;

    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
}

input,
textarea{
    -webkit-user-select:text;
    -ms-user-select:text;
    user-select:text;
}

/* BODY */
body{
    margin:0;
    padding:20px;
    background:#000;
    overflow-x:hidden;

    color:white;

    font-family:Arial,Helvetica,sans-serif;

    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
}

/* CONTAINER */
.page{
    width:100%;
    max-width:1400px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
}

/* TITEL */
h2{
    color:white;
    margin-top:0;
    margin-bottom:25px;
}

/* TOP */
.top{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

/* SUCHFELD */
.searchBox input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#111318;
    color:white;
    font-size:16px;
    outline:none;
}

/* BUTTONS */
.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 18px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.searchBtn{
    background:#2563eb;
}

.back{
    background:#6b7280;
}

.logout{
    background:#f59e0b;
}

/* VORSCHLÄGE */
.suggestions{
    background:#111318;
    border-radius:16px;
    min-height:300px;
    max-height:300px;
    overflow:auto;
    padding:10px;
    color:white;
}

.suggestions *{
    color:white !important;
}

.suggest{
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
    color:white;
}

.suggest:hover{
    background:#1c1f26;
}

/* STATUS */
.status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:white;
}

/* ERGEBNISSE */
.results{
    margin-top:35px;

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(350px,1fr));

    gap:25px;
}

/* KARTEN */
.card{
    background:#111318;
    border-radius:20px;

    overflow:visible;

    box-shadow:0 0 15px rgba(0,0,0,0.3);

    transition:0.2s;

    position:relative;
}

/* WICHTIG -> KEIN transform mehr */
.card:hover{
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* BILD */
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

/* CONTENT */
.content{
    padding:20px;
    color:white;
}

/* TITEL */
.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
    color:white;
}

/* ZEILEN */
.line{
    margin-bottom:10px;
    line-height:1.6;
    color:#e2e8f0;
}

/* LINKS */
.phone{
    color:#60a5fa;
    text-decoration:none;
}

.phone:hover{
    text-decoration:underline;
}

/* DETAIL */
.detail{
    margin-top:18px;
    background:#1c1f26;
    padding:15px;
    border-radius:14px;
    white-space:pre-wrap;
    line-height:1.6;
    color:white;
}

/* LEER */
.empty{
    text-align:center;
    padding:40px;
    font-size:18px;
    color:white;
}

/* MOBILE */
@media(max-width:950px){

    .top{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="page">

<h2>
    Geräte Suche
</h2>

<div class="top">

    <div class="searchBox">

        <input
        id="search"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="Gerät oder Beladung suchen..."
        oninput="suggest()">

        <div class="buttons">

            <button
            class="searchBtn"
            onclick="doSearch()">

                Suchen

            </button>

            <button
            class="back"
            onclick="back()">

                Zurück

            </button>

            <button
            class="logout"
            onclick="logout()">

                Logout

            </button>

        </div>

    </div>

    <div
    id="suggestions"
    class="suggestions">
    </div>

</div>

<div id="status" class="status"></div>

<div id="results" class="results"></div>

</div>

<script type="module">

import "./firebase.js";

let geraete = [];
let fahrzeuge = [];

/* GERÄTE LADEN */
onValue(ref(db,"geraete"), snap=>{

    geraete =
        Object.values(
            snap.val() || {}
        );

});

/* FAHRZEUGE LADEN */
onValue(ref(db,"fahrzeuge"), snap=>{

    fahrzeuge =
        Object.values(
            snap.val() || {}
        );

    status.innerHTML =
        "✅ Daten geladen";

});

/* VORSCHLÄGE */
window.suggest = function(){

    let q =
        search.value
        .toLowerCase()
        .trim();

    suggestions.innerHTML = "";

    if(!q) return;

    let found = new Set();

    /* GERÄTE */
    geraete.forEach(g=>{

        if(
            g.geraete &&
            g.geraete
            .toLowerCase()
            .includes(q)
        ){

            found.add(g.geraete);

        }

    });

    /* FAHRZEUGE */
    fahrzeuge.forEach(f=>{

        if(!f.beladung) return;

        f.beladung
        .split(",")

        .forEach(t=>{

            let name = t.trim();

            if(
                name
                .toLowerCase()
                .includes(q)
            ){

                found.add(name);

            }

        });

    });

    let count = 0;

    [...found]
    .sort()
    .forEach(name=>{

        if(count >= 15) return;

        let div =
            document.createElement("div");

        div.className = "suggest";

        /* WICHTIG */
        div.textContent = name;

        div.onclick = ()=>{

            search.value = name;

            doSearch();

        };

        suggestions.appendChild(div);

        count++;

    });

};

/* SUCHE */
window.doSearch = function(){

    let q =
        search.value
        .toLowerCase()
        .trim();

    results.innerHTML = "";

    let found = 0;

    /* GERÄTE */
    geraete.forEach(g=>{

        if(
            g.geraete &&
            g.geraete
            .toLowerCase()
            .includes(q)
        ){

            found++;

            showGeraet(g);

        }

    });

    /* FAHRZEUGE */
    fahrzeuge.forEach(f=>{

        if(
            f.beladung &&
            f.beladung
            .toLowerCase()
            .includes(q)
        ){

            found++;

            showFahrzeug(f);

        }

    });

    if(found === 0){

        results.innerHTML = `
            <div class="empty">
                Keine Treffer gefunden
            </div>
        `;

    }

};

/* GERÄTEKARTE */
function showGeraet(g){

    let card =
        document.createElement("div");

    card.className = "card";

    card.innerHTML = `

        ${
            g.bild
            ? `<img src="${g.bild}">`
            : ""
        }

        <div class="content">

            <div class="title">
                ${g.geraete || "-"}
            </div>

            <div class="line">
                <b>Lagerort:</b>
                ${g.lagerort || "-"}
            </div>

            <div class="line">
                <b>Ort:</b>
                ${g.ort || "-"}
            </div>

            <div class="line">
                <b>Adresse:</b>
                ${g.adresse || "-"}
            </div>

            <div class="line">
                <b>Telefon:</b>

                ${
                    g.telefon
                    ? `
                    <a
                    class="phone"
                    href="tel:${g.telefon}">
                        ${g.telefon}
                    </a>
                    `
                    : "-"
                }

            </div>

            <div class="line">
                <b>E-Mail:</b>

                ${
                    g.email
                    ? `
                    <a
                    class="phone"
                    href="mailto:${g.email}">
                        ${g.email}
                    </a>
                    `
                    : "-"
                }

            </div>

        </div>

    `;

    results.appendChild(card);

}

/* FAHRZEUGKARTE */
function showFahrzeug(f){

    let beladung =
        f.beladung || "";

    let card =
        document.createElement("div");

    card.className = "card";

    card.innerHTML = `

        ${
            f.bild
            ? `<img src="${f.bild}">`
            : ""
        }

        <div class="content">

            <div class="title">
                ${f.fahrzeug || "-"}
            </div>

            <div class="line">
                <b>Ort:</b>
                ${f.ort || "-"}
            </div>

            <div class="line">
                <b>Adresse:</b>
                ${f.adresse || "-"}
            </div>

            <div class="line">
                <b>Telefon:</b>

                ${
                    f.telefon
                    ? `
                    <a
                    class="phone"
                    href="tel:${f.telefon}">
                        ${f.telefon}
                    </a>
                    `
                    : "-"
                }

            </div>

            <div class="detail">

                <b>Beladung:</b>
                <br><br>

                ${beladung}

            </div>

        </div>

    `;

    results.appendChild(card);

}

/* ENTER */
search.addEventListener("keypress", e=>{

    if(e.key === "Enter"){

        doSearch();

    }

});

/* ZURÜCK */
window.back = function(){

    location.href = "index.html";

};

</script>

</body>
</html>
