<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Geräte Suche</title>

<style>
body {
    background:#0f1117;
    color:white;
    font-family:Segoe UI;
}

.container {
    max-width:1100px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:15px;
}

input {
    width:100%;
    padding:12px;
    border-radius:10px;
    background:#111318;
    color:white;
    border:none;
}

.results {
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.card {
    background:#111318;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>Geräte Suche</h2>

<input id="s" placeholder="Gerät suchen..." oninput="search()">

<div id="results" class="results"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let geraete = [];
let fahrzeuge = [];

/* beide laden */
onValue(ref(db,"geraete"), s=>{
    geraete = Object.values(s.val()||{});
});

onValue(ref(db,"fahrzeuge"), s=>{
    fahrzeuge = Object.values(s.val()||{});
});

/* Suche */
window.search = function(){

    let q = s.value.toLowerCase();
    results.innerHTML="";

    /* normale Geräte */
    geraete.forEach(d=>{
        if(d.geraete?.toLowerCase().includes(q)){
            showCard(d, "gerät");
        }
    });

    /* 🔥 Fahrzeuge durchsuchen */
    fahrzeuge.forEach(d=>{
        if(d.beladung?.toLowerCase().includes(q)){
            showCard(d, "fahrzeug");
        }
    });
};

function showCard(d, type){

    let c = document.createElement("div");
    c.className="card";

    if(type==="gerät"){
        c.innerHTML=`
        <b>${d.geraete}</b><br><br>
        📍 liegt auf ${d.lagerort || "-"}<br><br>
        Ort: ${d.ort}<br>
        Adresse: ${d.adresse}<br>
        Telefon: ${d.telefon}
        `;
    }

    if(type==="fahrzeug"){
        c.innerHTML=`
        <b>${d.fahrzeug}</b><br><br>
        📍 liegt auf Fahrzeug (${d.fahrzeug})<br><br>
        Ort: ${d.ort}<br>
        Adresse: ${d.adresse}<br>
        Beladung enthält gesuchtes Gerät
        `;
    }

    results.appendChild(c);
}

</script>

</body>
</html>
