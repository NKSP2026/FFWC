<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Geräte Suche</title>

<style>
body {
    background:#0f1117;
    color:white;
    font-family:Segoe UI;
}

.container {
    max-width:1100px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:15px;
}

/* Suchbereich */
.search-area {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

input {
    width:100%;
    padding:12px;
    border-radius:10px;
    background:#111318;
    color:white;
    border:none;
}

/* Buttons */
.buttons {
    margin-top:10px;
    display:flex;
    gap:10px;
}

button {
    padding:10px 16px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.search-btn {
    background:#3b82f6;
    color:white;
}

.cancel-btn {
    background:#ef4444;
    color:white;
}

/* Vorschläge */
#suggestions {
    background:#111318;
    border-radius:12px;
    padding:10px;
    height:250px;
    overflow-y:auto;
}

.suggest-item {
    padding:8px;
    cursor:pointer;
    border-radius:6px;
}

.suggest-item:hover {
    background:#2a2f3a;
}

/* Ergebnisse */
.results {
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.card {
    background:#111318;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>Geräte Suche</h2>

<div class="search-area">

    <!-- LINKS -->
    <div>
        <input id="s" placeholder="Gerät suchen..." oninput="suggest()">

        <div class="buttons">
            <button class="search-btn" onclick="doSearch()">Suchen</button>
            <button class="cancel-btn" onclick="back()">Abbrechen</button>
        </div>
    </div>

    <!-- RECHTS -->
    <div id="suggestions"></div>

</div>

<div id="results" class="results"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let geraete = [];
let fahrzeuge = [];

/* Daten laden */
onValue(ref(db,"geraete"), s=>{
    geraete = Object.values(s.val()||{});
});

onValue(ref(db,"fahrzeuge"), s=>{
    fahrzeuge = Object.values(s.val()||{});
});


/* 🔥 Vorschläge */
window.suggest = function(){

    let q = s.value.toLowerCase();
    suggestions.innerHTML = "";

    if(!q) return;

    let found = new Set();

    /* Geräte */
    geraete.forEach(d=>{
        if(d.geraete && d.geraete.toLowerCase().includes(q)){
            found.add(d.geraete);
        }
    });

    /* Fahrzeuge Beladung */
    fahrzeuge.forEach(d=>{
        if(d.beladung){

            let teile = d.beladung.split(",");

            teile.forEach(t=>{
                let name = t.trim();

                if(name.toLowerCase().includes(q)){
                    found.add(name);
                }
            });
        }
    });

    /* Anzeigen */
    found.forEach(name=>{
        let div = document.createElement("div");
        div.className="suggest-item";
        div.innerText = name;

        div.ondblclick = ()=>{
            s.value = name;
            doSearch();
        };

        suggestions.appendChild(div);
    });
};


/* 🔎 Suche */
window.doSearch = function(){

    let q = s.value.toLowerCase();
    results.innerHTML="";

    /* Geräte */
    geraete.forEach(d=>{
        if(d.geraete?.toLowerCase().includes(q)){
            showCard(d,"gerät");
        }
    });

    /* Fahrzeuge */
    fahrzeuge.forEach(d=>{
        if(d.beladung?.toLowerCase().includes(q)){
            showCard(d,"fahrzeug");
        }
    });
};


/* ENTER Taste */
s.addEventListener("keypress", e=>{
    if(e.key==="Enter") doSearch();
});


function showCard(d,type){

    let c = document.createElement("div");
    c.className="card";

    if(type==="gerät"){
        c.innerHTML=`
        <b>${d.geraete}</b><br><br>
        📍 liegt auf ${d.lagerort || "-"}<br><br>
        Ort: ${d.ort}<br>
        Adresse: ${d.adresse}<br>
        Telefon: ${d.telefon || "-"}
        `;
    }

    if(type==="fahrzeug"){
        c.innerHTML=`
        <b>${d.fahrzeug}</b><br><br>
        📍 liegt auf Fahrzeug (${d.fahrzeug})<br><br>
        Ort: ${d.ort}<br>
        Adresse: ${d.adresse}<br>
        🔧 enthält gesuchtes Gerät
        `;
    }

    results.appendChild(c);
}


/* Zurück */
window.back = function(){
    window.location.href = "index.html";
};

</script>

</body>
</html>
