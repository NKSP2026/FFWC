<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsatzgeräte Suche</title>

<style>

/* Hintergrund */
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0f1117;
    color: white;
}

/* Container */
.container {
    max-width: 1100px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* Titel */
h2 {
    margin-bottom: 20px;
}

/* ===== SUCHBEREICH ===== */
.search-area {
    display: grid;
    grid-template-columns: 2fr 1fr; /* 👉 rechts größer */
    column-gap: 40px;              /* 👉 Abstand */
    align-items: start;
}

/* Eingabe */
input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #111318;
    color: white;
    margin-bottom: 10px;
}

/* Vorschläge */
#suggestions {
    height: 220px;
    background: #111318;
    border-radius: 12px;
    padding: 12px;
    overflow-y: auto;
}

/* Vorschlag */
.suggest-item {
    padding: 8px;
    cursor: pointer;
    border-radius: 6px;
}

.suggest-item:hover {
    background: #2a2f3a;
}

/* Buttons */
.buttons {
    display: flex;
    gap: 10px;
}

button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.search-btn {
    background: #3b82f6;
    color: white;
}

.cancel-btn {
    background: #ef4444;
    color: white;
}

/* ===== ERGEBNISSE ===== */
.results {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
    gap: 20px;
}

/* Karte */
.card {
    background: #111318;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

/* Bild */
.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
}

</style>
</head>
<body>

<div class="container">

<h2>Einsatzgeräte Suche</h2>

<div class="search-area">

    <!-- LINKS -->
    <div>
        <input id="search" placeholder="Gerät suchen..." oninput="suggest()">

        <div class="buttons">
            <button class="search-btn" onclick="doSearch()">Suchen</button>
            <button class="cancel-btn" onclick="back()">Abbrechen</button>
        </div>
    </div>

    <!-- RECHTS -->
    <div id="suggestions"></div>

</div>

<!-- Ergebnisse -->
<div class="results" id="results"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ffwc-d3994.firebaseapp.com",
  databaseURL: "https://ffwc-d3994-default-rtdb.firebaseio.com/",
  projectId: "ffwc-d3994",
  storageBucket: "ffwc-d3994.appspot.com",
  messagingSenderId: "591233232022",
  appId: "1:591233232022:web:66ce4e0349d426e94ae6b7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = [];

/* Daten laden */
onValue(ref(db, "geraete"), snap => {
    console.log("GERAETE:", snap.val());
    data = Object.values(snap.val() || {});
});

/* Vorschläge */
window.suggest = function(){

    let s = search.value.toLowerCase();
    suggestions.innerHTML = "";

    if(!s) return;

    let found = [];

    data.forEach(d=>{
        if(d.geraete && d.geraete.toLowerCase().includes(s)){
            if(!found.includes(d.geraete)){
                found.push(d.geraete);
            }
        }
    });

    found.forEach(g=>{
        let div = document.createElement("div");
        div.className = "suggest-item";
        div.innerText = g;

        /* Doppelklick */
        div.ondblclick = ()=>{
            search.value = g;
            doSearch();
        };

        suggestions.appendChild(div);
    });
};

/* Suche */
window.doSearch = function(){

    let s = search.value.toLowerCase();
    results.innerHTML = "";

    data.forEach(d=>{

        if(d.geraete && d.geraete.toLowerCase().includes(s)){

            let card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                ${d.bild ? `<img src="${d.bild}">` : ""}
                <b>Ort:</b> ${d.ort || "-"}<br>
                <b>Einsatzgerät:</b> ${d.geraete || "-"}<br>
                <b>Bemerkung:</b> ${d.bemerkung || "-"}
            `;

            results.appendChild(card);
        }

    });

};

/* Zurück */
window.back = function(){
    window.location.href = "index.html";
};

</script>

</body>
</html>
