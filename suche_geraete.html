<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"></head>
<body>

<input id="s" oninput="search()">
<select id="list" size="10"></select>
<div id="out"></div>

<script type="module">
import "./firebase.js";

let all=[];

onValue(ref(db,"daten"), snap=>{
    all = Object.values(snap.val()||{});
});

window.search=function(){
    list.innerHTML="";
    all.forEach(d=>{
        if(d.geraete?.toLowerCase().includes(s.value.toLowerCase())){
            let o=new Option(d.geraete+" - "+d.ort);
            o.onclick=()=>out.innerHTML+=d.geraete+"<br>";
            list.add(o);
        }
    });
}
</script>

</body>
</html>
