<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
    margin:0;
    font-family:"Segoe UI";
    background:#0b1020;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    color:white;
}

.box{
    width:360px;
    background:#1c1f26;
    padding:40px;
    border-radius:22px;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
    text-align:center;
}

h1{
    margin-bottom:10px;
    color:#6ea8ff;
    font-size:44px;
}

p{
    color:#9ca3af;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#111318;
    color:white;
    font-size:16px;
    box-sizing:border-box;
    margin-bottom:20px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

#error{
    margin-top:18px;
    color:#ff4d4d;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h1>Landfunkstelle</h1>

<p>Anmeldung Feuerwehrsystem</p>

<input
type="password"
id="password"
placeholder="Passwort">

<button onclick="login()">
Anmelden
</button>

<div id="error"></div>

</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
setPersistence,
browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

  apiKey: "AIzaSyDSYQZGiKbXjy9142dKq_4Upc9zfvekOHE",

  authDomain: "ffwc-d3994.firebaseapp.com",

  databaseURL:
  "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app",

  projectId: "ffwc-d3994",

  storageBucket: "ffwc-d3994.firebasestorage.app",

  messagingSenderId: "591233232022",

  appId:
  "1:591233232022:web:66ce4e0349d426e94ae6b7",

  measurementId: "G-BG75M1KXHL"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* LOGIN */

window.login = async function(){

    error.innerHTML = "";

    try{

        await setPersistence(
            auth,
            browserLocalPersistence
        );

        await signInWithEmailAndPassword(

            auth,

            "winklerronny10@gmail.com",

            password.value

        );

        window.location.href =
            "index.html";

    }catch(e){

        console.error(e);

        error.innerHTML =
            "Falsches Passwort";

    }

};

/* ENTER TASTE */

password.addEventListener(
"keypress",
function(e){

    if(e.key === "Enter"){

        login();

    }

});

</script>

</body>
</html>
