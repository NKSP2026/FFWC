<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Protokolle</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
    max-width:1400px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
}

.top{
    display:grid;
    grid-template-columns:1fr auto;
    gap:20px;
    align-items:end;
}

.uploadBox{
    background:#111318;
    padding:20px;
    border-radius:18px;
}

.uploadBox input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1c1f26;
    color:white;
}

.search{
    margin-top:20px;
}

.search input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111318;
    color:white;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:14px 20px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.upload{
    background:#2563eb;
}

.back{
    background:#6b7280;
}

.logout{
    background:#f59e0b;
}

.delete{
    background:#dc2626;
}

.open{
    background:#10b981;
}

.status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.list{
    margin-top:35px;
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(340px,1fr));
    gap:25px;
}

.card{
    background:#111318;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.pdfTop{
    background:#dc2626;
    height:140px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
}

.content{
    padding:20px;
}

.title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
    word-break:break-word;
}

.info{
    margin-bottom:10px;
    line-height:1.5;
}

.actions{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.empty{
    text-align:center;
    padding:50px;
    font-size:20px;
}

@media(max-width:900px){

    .top{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="page">

<h2>📄 Protokolle</h2>

<div class="top">

    <div class="uploadBox">

        <input
        type="file"
        id="file"
        accept="application/pdf">

        <div class="search">

            <input
            id="search"
            placeholder="Protokoll suchen..."
            oninput="renderList()">

        </div>

    </div>

    <div class="buttons">

        <button
        class="upload"
        onclick="uploadPDF()">

            PDF hochladen

        </button>

        <button
        class="back"
        onclick="back()">

            Zurück

        </button>

        <button
        class="logout"
        onclick="logout()">

            Logout

        </button>

    </div>

</div>

<div id="status" class="status"></div>

<div id="list" class="list"></div>

</div>

<script type="module">

/* ZENTRALES FIREBASE */
import "./firebase.js";

let pdfData = {};

/* Upload */
window.uploadPDF = async function(){

    try{

        let f = file.files[0];

        if(!f){

            alert(
                "Bitte PDF auswählen"
            );

            return;

        }

        if(
            !f.name
            .toLowerCase()
            .endsWith(".pdf")
        ){

            alert(
                "Nur PDF erlaubt"
            );

            return;

        }

        status.innerHTML =
            "PDF wird hochgeladen...";

        let path =

            "pdfs/" +

            Date.now() +

            "_" +

            f.name;

        let pdfRef =
            storageRef(storage,path);

        await uploadBytes(
            pdfRef,
            f
        );

        let url =
            await getDownloadURL(pdfRef);

        await push(
            ref(db,"pdfs"),
            {

                name: f.name,

                url: url,

                path: path,

                size:
                    (
                        f.size /
                        1024 /
                        1024
                    )
                    .toFixed(2),

                erstelltAm:
                    nowDate() +
                    " " +
                    nowTime(),

                timestamp:
                    Date.now()

            }
        );

        status.innerHTML =
            "✅ Upload erfolgreich";

        file.value = "";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Upload Fehler";

    }

};

/* Daten laden */
onValue(ref(db,"pdfs"), snap=>{

    pdfData = snap.val() || {};

    renderList();

});

/* Liste rendern */
window.renderList = function(){

    list.innerHTML = "";

    let q =
        search.value
        .toLowerCase();

    let arr =
        Object.entries(pdfData);

    arr.sort(
        (a,b)=>

        (b[1].timestamp || 0) -

        (a[1].timestamp || 0)
    );

    let found = 0;

    arr.forEach(([key,p])=>{

        let text =
            JSON.stringify(p)
            .toLowerCase();

        if(q && !text.includes(q)) return;

        found++;

        let div =
            document.createElement("div");

        div.className = "card";

        div.innerHTML = `

            <div class="pdfTop">
                📄
            </div>

            <div class="content">

                <div class="title">
                    ${p.name || "-"}
                </div>

                <div class="info">

                    <b>Datum:</b><br>

                    ${
                        p.erstelltAm ||
                        "-"
                    }

                </div>

                <div class="info">

                    <b>Größe:</b><br>

                    ${
                        p.size || "-"
                    } MB

                </div>

                <div class="actions">

                    <button
                    class="open"
                    onclick="openPDF(
                        '${p.url}'
                    )">

                        Öffnen

                    </button>

                    <button
                    class="delete"
                    onclick="deletePDF(
                        '${key}',
                        '${p.path}'
                    )">

                        Löschen

                    </button>

                </div>

            </div>

        `;

        list.appendChild(div);

    });

    if(found === 0){

        list.innerHTML = `
            <div class="empty">
                Keine Protokolle gefunden
            </div>
        `;

    }

};

/* Öffnen */
window.openPDF = function(url){

    window.open(url,"_blank");

};

/* Löschen */
window.deletePDF = async function(
    key,
    path
){

    if(
        !confirm(
            "PDF wirklich löschen?"
        )
    ) return;

    try{

        status.innerHTML =
            "Lösche PDF...";

        /* Storage löschen */
        if(path){

            await deleteObject(
                storageRef(
                    storage,
                    path
                )
            );

        }

        /* Datenbank löschen */
        await remove(
            ref(db,"pdfs/" + key)
        );

        status.innerHTML =
            "🗑️ PDF gelöscht";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Löschen";

    }

};

/* Zurück */
window.back = function(){

    location.href = "index.html";

};

</script>

</body>
</html>
