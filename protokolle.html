<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsatzsystem</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f1117;
    color:white;
}

.container {
    max-width:900px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:15px;
}

input, textarea {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:5px;
    background:#111318;
    color:white;
}

button {
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.open { background:#3b82f6; }
.mail { background:#10b981; }
.pdf { background:#f59e0b; }
</style>
</head>

<body>

<div class="container">

<h2>Einsatzsystem</h2>

<input type="password" id="pw" placeholder="Passwort">
<button class="open" onclick="openP()">Öffnen</button>

<div id="area" style="display:none">

<h3>✉ Empfänger</h3>
<input id="mail_to" placeholder="z.B. leitstelle@zwickau.de">

<h3>🚒 Einsatzdaten</h3>

<input id="einsatz_art" placeholder="Einsatzart">
<input id="einsatz_ort" placeholder="Ort">
<input id="einsatz_adresse" placeholder="Adresse">
<textarea id="einsatz_info" placeholder="Infos"></textarea>

<h3>🚗 Fahrzeuge auswählen</h3>
<div id="fahrzeuge"></div>

<button class="mail" onclick="sendMail()">Einsatz-Mail</button>
<button class="pdf" onclick="createPDF()">PDF erstellen</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let fahrzeugeData = [];

/* Passwort */
window.openP = function(){
    if(pw.value==="1234"){
        area.style.display="block";
        loadFahrzeuge();
    }
};

/* Fahrzeuge */
function loadFahrzeuge(){

    onValue(ref(db,"fahrzeuge"), snap=>{

        fahrzeuge.innerHTML="";
        fahrzeugeData = Object.values(snap.val()||{});

        fahrzeugeData.forEach((f,i)=>{

            let div = document.createElement("div");

            div.innerHTML = `
                <label>
                    <input type="checkbox" value="${i}">
                    ${f.fahrzeug} (${f.funk || "-"})
                </label>
            `;

            fahrzeuge.appendChild(div);
        });
    });
}

/* Auswahl */
function getSelectedFahrzeuge(){

    let checked = document.querySelectorAll("#fahrzeuge input:checked");
    let list = [];

    checked.forEach(c=>{
        let f = fahrzeugeData[c.value];
        list.push(f.fahrzeug + " (" + (f.funk||"-") + ")");
    });

    return list.join(", ");
}

/* 🔥 Mail */
window.sendMail = function(){

    let empfaenger = mail_to.value || ""; // frei eingeben

    let body = `
Einsatzbericht

Art: ${einsatz_art.value}
Ort: ${einsatz_ort.value}
Adresse: ${einsatz_adresse.value}

Fahrzeuge:
${getSelectedFahrzeuge()}

Info:
${einsatz_info.value}

Zeit: ${new Date().toLocaleString()}
`;

    window.location.href =
    `mailto:${encodeURIComponent(empfaenger)}?subject=Einsatzbericht&body=${encodeURIComponent(body)}`;
};

/* PDF */
window.createPDF = function(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 10;

    function line(txt){
        doc.text(txt, 10, y);
        y += 8;
    }

    line("Einsatzbericht");
    line("----------------");

    line("Art: " + einsatz_art.value);
    line("Ort: " + einsatz_ort.value);
    line("Adresse: " + einsatz_adresse.value);

    line("");
    line("Fahrzeuge:");
    line(getSelectedFahrzeuge());

    line("");
    line("Info:");
    line(einsatz_info.value);

    line("");
    line("Zeit: " + new Date().toLocaleString());

    doc.save("Einsatzbericht.pdf");
};

</script>

</body>
</html>
