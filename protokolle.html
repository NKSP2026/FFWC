<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Protokolle</title> 

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f1117;
    color:white;
}

.container {
    max-width:900px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:15px;
}

input {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#111318;
    color:white;
}

button {
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.upload { background:#3b82f6; }
.back { background:#6b7280; }

.file {
    background:#111318;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 Protokolle</h2>

<input type="file" id="file">
<button class="upload" onclick="upload()">PDF hochladen</button>

<div id="list"></div>

<button class="back" onclick="back()">Zurück</button>

</div>

<script type="module">

if(localStorage.getItem("login") !== "ok"){
    window.location.href = "login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/",
  storageBucket:"ffwc-d3994.appspot.com"
});

const db = getDatabase(app);
const storage = getStorage(app);

/* Upload */
window.upload = async function(){

    let f = file.files[0];
    if(!f) return;

    let path = "pdfs/" + Date.now() + "_" + f.name;

    let storageRef = sRef(storage, path);

    await uploadBytes(storageRef, f);

    let url = await getDownloadURL(storageRef);

    await push(ref(db,"pdfs"), {
        name: f.name,
        url: url,
        time: new Date().toLocaleString()
    });

    alert("Upload fertig");
};

/* Liste */
onValue(ref(db,"pdfs"), snap=>{

    list.innerHTML="";

    let data = snap.val()||{};

    Object.values(data).forEach(f=>{

        let div = document.createElement("div");
        div.className="file";

        div.innerHTML = `
            <b>${f.name}</b><br>
            <a href="${f.url}" target="_blank">Öffnen / Download</a><br>
            <small>${f.time}</small>
        `;

        list.appendChild(div);
    });
});

/* zurück */
window.back = ()=>{
    location.href="index.html";
};

</script>

</body>
</html>
