<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Protokolle</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f1117;
    color: white;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 30px;
    border-radius: 15px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 5px;
    background: #111318;
    color: white;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.open { background:#3b82f6; }
.mail { background:#10b981; }
.save { background:#3b82f6; }

.file {
    background:#111318;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Protokolle</h2>

<input type="password" id="pw" placeholder="Passwort">
<button class="open" onclick="openP()">Öffnen</button>

<div id="area" style="display:none">

<h3>📄 PDF hochladen</h3>
<input type="file" id="file">
<button onclick="upload()">Hochladen</button>

<div id="list"></div>

<hr>

<h3>✉ Mail Einstellungen</h3>

<label>Empfänger</label>
<input id="mail_to">

<label>Betreff</label>
<input id="mail_subject">

<label>Standard Nachricht</label>
<textarea id="mail_body"></textarea>

<button class="save" onclick="saveMail()">Speichern</button>

<hr>

<h3>🚒 Einsatz-Mail senden</h3>

<input id="einsatz_art" placeholder="Einsatzart (z.B. Brand, TH)">
<input id="einsatz_ort" placeholder="Ort">
<input id="einsatz_adresse" placeholder="Adresse">

<textarea id="einsatz_info" placeholder="Weitere Infos"></textarea>

<button class="mail" onclick="sendEinsatzMail()">Einsatz-Mail senden</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/",
  storageBucket: "ffwc-d3994.appspot.com"
});

const db = getDatabase(app);
const storage = getStorage(app);

/* Passwort */
window.openP = function(){
    if(pw.value === "1234"){
        area.style.display = "block";
        loadFiles();
        loadMail();
    }
};

/* Upload */
window.upload = async function(){

    let f = file.files[0];
    if(!f) return;

    let path = "pdfs/" + Date.now() + "_" + f.name;

    let storageRef = sRef(storage, path);

    await uploadBytes(storageRef, f);

    let url = await getDownloadURL(storageRef);

    await push(ref(db,"pdfs"), {
        name: f.name,
        url: url,
        time: new Date().toLocaleString()
    });

    alert("Upload fertig");
};

/* PDF Liste */
function loadFiles(){
    onValue(ref(db,"pdfs"), snap=>{
        list.innerHTML="";
        let data = snap.val()||{};

        Object.values(data).forEach(f=>{
            let div = document.createElement("div");
            div.className="file";
            div.innerHTML = `
                <b>${f.name}</b><br>
                <a href="${f.url}" target="_blank">Öffnen</a><br>
                <small>${f.time}</small>
            `;
            list.appendChild(div);
        });
    });
}

/* Mail speichern */
window.saveMail = function(){

    set(ref(db,"mail"), {
        to: mail_to.value,
        subject: mail_subject.value,
        body: mail_body.value
    });

    alert("Gespeichert");
};

/* Mail laden */
function loadMail(){

    onValue(ref(db,"mail"), snap=>{
        let m = snap.val();
        if(!m) return;

        mail_to.value = m.to || "";
        mail_subject.value = m.subject || "";
        mail_body.value = m.body || "";
    });
}

/* 🔥 Einsatz-Mail */
window.sendEinsatzMail = function(){

    let to = encodeURIComponent(mail_to.value);
    let subject = encodeURIComponent(mail_subject.value);

    let now = new Date().toLocaleString();

    let body = `
${mail_body.value}

--- Einsatzmeldung ---
Art: ${einsatz_art.value}
Ort: ${einsatz_ort.value}
Adresse: ${einsatz_adresse.value}
Zeit: ${now}

Info:
${einsatz_info.value}
`;

    window.location.href = `mailto:${to}?subject=${subject}&body=${encodeURIComponent(body)}`;
};

</script>

</body>
</html>
