<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Protokolle</title> 

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f1117;
    color:white;
}

.container {
    max-width:900px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:15px;
}

input {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#111318;
    color:white;
}

button {
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.upload { background:#3b82f6; }
.back { background:#6b7280; }

.file {
    background:#111318;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 Protokolle</h2>

<input type="file" id="file" accept="application/pdf">
<button class="upload" onclick="upload()">PDF hochladen</button>

<div id="list">Lade Daten...</div>

<button class="back" onclick="back()">Zurück</button>

</div>

<script type="module">

/* 🔒 LOGIN */
if(localStorage.getItem("login") !== "ok"){
    window.location.href = "login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/",
  storageBucket:"ffwc-d3994.appspot.com"
});

const db = getDatabase(app);
const storage = getStorage(app);

/* 🔥 UPLOAD */
window.upload = async function(){

    let f = file.files[0];

    if(!f){
        alert("Bitte Datei auswählen!");
        return;
    }

    if(!f.name.endsWith(".pdf")){
        alert("Nur PDF erlaubt!");
        return;
    }

    try{

        let path = "pdfs/" + Date.now() + "_" + f.name;

        let storageRef = sRef(storage, path);

        await uploadBytes(storageRef, f);

        let url = await getDownloadURL(storageRef);

        await push(ref(db,"pdfs"), {
            name: f.name,
            url: url,
            time: new Date().toLocaleString()
        });

        alert("Upload erfolgreich!");

        file.value = ""; // reset

    }catch(e){
        alert("Fehler beim Upload!");
        console.error(e);
    }
};

/* 🔥 LISTE */
onValue(ref(db,"pdfs"), snap=>{

    list.innerHTML="";

    let data = snap.val() || {};

    let arr = Object.values(data);

    /* 🔥 NEU: sortiert nach neuestem */
    arr.sort((a,b)=> new Date(b.time) - new Date(a.time));

    if(arr.length === 0){
        list.innerHTML = "Keine Protokolle vorhanden";
        return;
    }

    arr.forEach(f=>{

        let div = document.createElement("div");
        div.className="file";

        div.innerHTML = `
            <b>${f.name}</b><br>
            <a href="${f.url}" target="_blank" style="color:#3b82f6">Öffnen / Download</a><br>
            <small>${f.time}</small>
        `;

        list.appendChild(div);
    });
});

/* 🔙 */
window.back = ()=> location.href="index.html";

</script>

</body>
</html>
