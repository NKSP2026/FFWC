<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fahrzeug Suche</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0f1117;
    color: white; 
}

.container {
    max-width: 1100px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 30px;
    border-radius: 15px;
}

h2 {
    margin-bottom: 20px;
}

/* Suchbereich */
.search-area {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 40px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #111318;
    color: white;
    box-sizing: border-box;
}

/* Vorschläge */
#suggestions {
    height: 260px;
    background: #111318;
    border-radius: 12px;
    padding: 12px;
    overflow-y: auto;
}

.suggest-item {
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
}

.suggest-item:hover {
    background: #2a2f3a;
}

/* Buttons */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.search-btn {
    background: #3b82f6;
    color: white;
}

.cancel-btn {
    background: #ef4444;
    color: white;
}

/* Ergebnisse */
.results {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px,1fr));
    gap: 20px;
}

/* Karten */
.card {
    background: #111318;
    border-radius: 12px;
    padding: 15px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
}

/* Bild */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
}

/* Details */
.detail {
    margin-top: 12px;
    padding: 12px;
    background: #1c1f26;
    border-radius: 8px;
    line-height: 1.5;
}

/* Telefon Link */
.phone {
    color: #60a5fa;
    text-decoration: none;
}

.phone:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>Fahrzeug Suche</h2>

<div class="search-area">

    <!-- LINKS -->
    <div>

        <input 
            id="search" 
            placeholder="Fahrzeug oder Gerät suchen..." 
            oninput="suggest()"
        >

        <div class="buttons">
            <button class="search-btn" onclick="doSearch()">Suchen</button>
            <button class="cancel-btn" onclick="back()">Abbrechen</button>
        </div>

    </div>

    <!-- RECHTS -->
    <div id="suggestions"></div>

</div>

<!-- Ergebnisse -->
<div id="results" class="results"></div>

</div>

<script type="module">

/* 🔒 LOGIN */
if(localStorage.getItem("login") !== "ok"){
    window.location.href = "login.html";
}

/* Firebase */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "ffwc-d3994.firebaseapp.com",
    databaseURL: "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "ffwc-d3994",
    storageBucket: "ffwc-d3994.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = [];

/* 🔥 Fahrzeuge laden */
onValue(ref(db, "fahrzeuge"), snap => {

    data = Object.values(snap.val() || {});

});

/* 🔎 Vorschläge */
window.suggest = function(){

    let s = search.value.toLowerCase().trim();

    suggestions.innerHTML = "";

    if(!s) return;

    let found = new Set();

    data.forEach(d => {

        let name = (d.fahrzeug || "").toLowerCase();
        let beladung = (d.beladung || "").toLowerCase();

        /* normale Suche */
        if(name.includes(s)){
            found.add(d.fahrzeug);
        }

        /* Beladung durchsuchen */
        if(beladung.includes(s)){
            found.add(d.fahrzeug);
        }

        /* Abkürzungen */
        if(
            s.includes("hlf") &&
            name.includes("hilfeleistung")
        ){
            found.add(d.fahrzeug);
        }

        if(
            s.includes("dl") &&
            name.includes("drehleiter")
        ){
            found.add(d.fahrzeug);
        }

        if(
            s.includes("rtb") &&
            name.includes("rettungsboot")
        ){
            found.add(d.fahrzeug);
        }

    });

    let count = 0;

    found.forEach(name => {

        if(count >= 15) return;

        let div = document.createElement("div");

        div.className = "suggest-item";
        div.innerText = name;

        /* Doppelklick */
        div.ondblclick = () => {

            search.value = name;
            doSearch();

        };

        suggestions.appendChild(div);

        count++;
    });

};

/* 🔥 Suche */
window.doSearch = function(){

    let s = search.value.toLowerCase().trim();

    results.innerHTML = "";

    data.forEach(d => {

        let name = (d.fahrzeug || "").toLowerCase();
        let beladung = (d.beladung || "").toLowerCase();

        if(
            name.includes(s) ||
            beladung.includes(s)
        ){

            let card = document.createElement("div");

            card.className = "card";

            card.innerHTML = `

                ${d.bild ? `<img src="${d.bild}">` : ""}

                <b>${d.fahrzeug || "-"}</b>

                <br><br>

                <b>Ort:</b> ${d.ort || "-"}<br>

                <b>Adresse:</b> ${d.adresse || "-"}<br>

                <b>Telefon:</b> 
                ${
                    d.telefon
                    ? `<a class="phone" href="tel:${d.telefon}">${d.telefon}</a>`
                    : "-"
                }
                <br>

                <b>Funk:</b> ${d.funk || "-"}<br>

                <b>Stärke:</b> ${d.staerke || "-"}
            `;

            /* 🔥 Klick = Details anzeigen */
            card.onclick = () => {

                let old = card.querySelector(".detail");

                /* schließen */
                if(old){
                    old.remove();
                    return;
                }

                let detail = document.createElement("div");

                detail.className = "detail";

                detail.innerHTML = `
                    <b>Beladung:</b><br><br>
                    ${d.beladung || "Keine Daten vorhanden"}
                `;

                card.appendChild(detail);
            };

            results.appendChild(card);
        }

    });

};

/* ENTER */
search.addEventListener("keypress", e => {

    if(e.key === "Enter"){
        doSearch();
    }

});

/* Zurück */
window.back = function(){

    window.location.href = "index.html";

};

</script>

</body>
</html>
