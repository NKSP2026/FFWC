<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fahrzeug Suche</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0f1117;
    color: white; 
}

.container {
    max-width: 1100px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 30px;
    border-radius: 15px;
}

h2 {
    margin-bottom: 20px;
}

.search-area {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 40px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #111318;
    color: white;
}

#suggestions {
    height: 260px;
    background: #111318;
    border-radius: 12px;
    padding: 12px;
    overflow-y: auto;
}

.suggest-item {
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
}

.suggest-item:hover {
    background: #2a2f3a;
}

.buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.search-btn { background: #3b82f6; }
.cancel-btn { background: #ef4444; }

.results {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px,1fr));
    gap: 20px;
}

.card {
    background: #111318;
    border-radius: 12px;
    padding: 15px;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
}

.detail {
    margin-top: 10px;
    padding: 10px;
    background: #1c1f26;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Fahrzeug Suche</h2>

<div class="search-area">

<div>
<input id="search" placeholder="Fahrzeug oder Gerät suchen..." oninput="suggest()">

<div class="buttons">
<button class="search-btn" onclick="doSearch()">Suchen</button>
<button class="cancel-btn" onclick="back()">Abbrechen</button>
</div>
</div>

<div id="suggestions"></div>

</div>

<div id="results" class="results"></div>

</div>

<script type="module">

/* 🔒 LOGIN */
if(localStorage.getItem("login") !== "ok"){
    window.location.href = "login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let data = [];

/* 🔥 Daten laden */
onValue(ref(db, "fahrzeuge"), snap => {
    data = Object.values(snap.val() || {});
});

/* 🔎 Vorschläge (verbessert) */
window.suggest = function(){

    let s = search.value.toLowerCase();
    suggestions.innerHTML = "";

    if(!s) return;

    let found = new Set();

    data.forEach(d => {

        let name = (d.fahrzeug || "").toLowerCase();
        let beladung = (d.beladung || "").toLowerCase();

        /* 🔥 Teilwortsuche */
        if(name.includes(s)) found.add(d.fahrzeug);

        /* 🔥 Beladung */
        if(beladung.includes(s)) found.add(d.fahrzeug);

        /* 🔥 Abkürzungen erweitert */
        if(name.includes("hilfeleistung") && s.includes("hlf")) found.add(d.fahrzeug);
        if(name.includes("drehleiter") && s.includes("dl")) found.add(d.fahrzeug);
        if(name.includes("rettungsboot") && s.includes("rtb")) found.add(d.fahrzeug);

    });

    let count = 0;

    found.forEach(name => {

        if(count > 15) return; // max 15 Vorschläge

        let div = document.createElement("div");
        div.className = "suggest-item";
        div.innerText = name;

        div.ondblclick = () => {
            search.value = name;
            doSearch();
        };

        suggestions.appendChild(div);
        count++;
    });
};

/* 🔥 Suche */
window.doSearch = function(){

    let s = search.value.toLowerCase();
    results.innerHTML = "";

    data.forEach(d => {

        let name = (d.fahrzeug || "").toLowerCase();
        let beladung = (d.beladung || "").toLowerCase();

        if(name.includes(s) || beladung.includes(s)){

            let card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                ${d.bild ? `<img src="${d.bild}">` : ""}
                <b>${d.fahrzeug}</b><br><br>
                <b>Ort:</b> ${d.ort || "-"}<br>
                <b>Adresse:</b> ${d.adresse || "-"}<br>
                <b>Funk:</b> ${d.funk || "-"}<br>
                <b>Stärke:</b> ${d.staerke || "-"}
            `;

            /* 🔥 Toggle Details */
            card.onclick = () => {

                let existing = card.querySelector(".detail");

                if(existing){
                    existing.remove();
                    return;
                }

                let detail = document.createElement("div");
                detail.className = "detail";

                detail.innerHTML = `
                    <b>Beladung:</b><br>
                    ${d.beladung || "Keine Daten"}
                `;

                card.appendChild(detail);
            };

            results.appendChild(card);
        }
    });
};

/* 🔙 */
window.back = () => location.href = "index.html";

</script>

</body>
</html>
