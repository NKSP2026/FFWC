<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fahrzeug Suche</title>
</head>
<body>

<h2>Fahrzeug Suche</h2>

<input id="search" placeholder="z.B. HLF oder Hilfeleistung..." oninput="search()">
<button>Suchen</button>
<button onclick="window.history.back()">Abbruch</button>

<br><br>

<select id="results" size="10" style="width:400px;"></select>

<div id="output"></div>

<script>

const fahrzeuge = [
    {name:"Hilfeleistungslöschgruppenfahrzeug 20", kurz:"HLF", ort:"Crimmitschau"},
    {name:"Löschgruppenfahrzeug 10", kurz:"LF", ort:"Frankenhausen"},
    {name:"Kleinlöschfahrzeug", kurz:"KLF", ort:"Gablenz"}
];

function search(){
    const value = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("results");
    list.innerHTML = "";

    fahrzeuge.forEach(f => {
        if(
            f.name.toLowerCase().includes(value) ||
            f.kurz.toLowerCase().includes(value)
        ){
            let option = document.createElement("option");
            option.text = f.name + " ("+f.kurz+") - " + f.ort;
            option.onclick = () => show(f);
            list.add(option);
        }
    });
}

function show(f){
    document.getElementById("output").innerHTML += `
        <p>
        Ort: ${f.ort}<br>
        Fahrzeug: ${f.name}<br>
        </p>
    `;
}

</script>

</body>
</html>
