<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Datenbank</title>

<link rel="stylesheet" href="style.css">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#050505;
    font-family:Arial,sans-serif;
    color:white;
    overflow-x:hidden;
}

.page{
    width:95%;
    max-width:1500px;
    margin:35px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:24px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.top{
    display:flex;
    gap:20px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
}

.search{
    flex:1;
    min-width:250px;
}

.search input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#111318;
    color:white;
    font-size:16px;
    outline:none;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:14px;
    padding:13px 20px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
    font-size:15px;
}

button:hover{
    transform:translateY(-2px);
}

.back{
    background:#6b7280;
}

.logout{
    background:#f59e0b;
}

.save{
    background:#2563eb;
}

.delete{
    background:#dc2626;
}

.cancel{
    background:#374151;
}

.sectionTitle{
    margin-top:45px;
    margin-bottom:22px;
    font-size:34px;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(360px,1fr));
    gap:24px;
}

.card{
    background:#111318;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 0 18px rgba(0,0,0,0.35);
    transition:0.25s;
}

.card:hover{
    transform:translateY(-4px);
}

.preview{
    cursor:pointer;
}

.previewImg{
    width:100%;
    height:230px;
    object-fit:cover;
}

.previewContent{
    padding:22px;
}

.previewTitle{
    font-size:28px;
    font-weight:bold;
    margin-bottom:12px;
    color:white;
    word-break:break-word;
}

.previewSub{
    color:#cbd5e1;
    margin-bottom:10px;
    font-size:16px;
}

.previewInfo{
    color:#60a5fa;
    font-size:15px;
    margin-top:8px;
    line-height:1.5;
}

.editBox{
    display:none;
    background:#0f1117;
    padding:22px;
    border-top:1px solid #1f2937;
}

.field{
    margin-bottom:18px;
}

.field label{
    display:block;
    margin-bottom:7px;
    font-weight:bold;
    color:white;
}

.field input,
.field textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#1c1f26;
    color:white;
    outline:none;
    font-size:15px;
}

.field textarea{
    min-height:120px;
    resize:vertical;
}

.actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:10px;
}

.status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:white;
    font-size:16px;
}

@media(max-width:950px){

    .page{
        padding:20px;
    }

    .top{
        flex-direction:column;
        align-items:stretch;
    }

    .buttons{
        width:100%;
    }

    .buttons button{
        flex:1;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .previewTitle{
        font-size:24px;
    }

}

</style>

</head>

<body>

<div class="page">

<div class="top">

    <div class="search">

        <input
        id="search"
        autocomplete="off"
        spellcheck="false"
        placeholder="Suche..."
        oninput="renderAll()">

    </div>

    <div class="buttons">

        <button
        class="back"
        onclick="back()">

            Zurück

        </button>

        <button
        class="logout"
        onclick="logout()">

            Logout

        </button>

    </div>

</div>

<div id="status" class="status"></div>

<h2 class="sectionTitle">
    Geräte
</h2>

<div
id="geraeteList"
class="grid">
</div>

<h2 class="sectionTitle">
    Fahrzeuge
</h2>

<div
id="fahrzeugeList"
class="grid">
</div>

</div>

<script type="module">

import {
    db
} from "./firebase.js";

import {

onValue,
ref,
update,
remove

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

let geraeteData = {};
let fahrzeugeData = {};

/* LADEN */
onValue(ref(db,"geraete"), snap=>{

    geraeteData = snap.val() || {};
    renderAll();

});

onValue(ref(db,"fahrzeuge"), snap=>{

    fahrzeugeData = snap.val() || {};
    renderAll();

});

/* RENDERN */
window.renderAll = function(){

    let q =
        document
        .getElementById("search")
        .value
        .toLowerCase();

    renderSection(
        document.getElementById("geraeteList"),
        geraeteData,
        "geraete",
        q
    );

    renderSection(
        document.getElementById("fahrzeugeList"),
        fahrzeugeData,
        "fahrzeuge",
        q
    );

};

/* SEKTION */
function renderSection(
    target,
    data,
    type,
    q
){

    target.innerHTML = "";

    Object.entries(data).forEach(([key,d])=>{

        let text =
            JSON.stringify(d)
            .toLowerCase();

        if(q && !text.includes(q)) return;

        let name =
            d.geraete ||
            d.fahrzeug ||
            "-";

        let subtitle =
            d.ort ||
            d.lagerort ||
            "Kein Ort";

        let card =
            document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div
            class="preview"
            ondblclick="
                toggleEdit(
                    '${type}',
                    '${key}'
                )
            ">

                ${
                    d.bild
                    ? `
                    <img
                    src="${d.bild}"
                    class="previewImg">
                    `
                    : ""
                }

                <div class="previewContent">

                    <div class="previewTitle">
                        ${name}
                    </div>

                    <div class="previewSub">
                        ${subtitle}
                    </div>

                    <div class="previewInfo">

                        ${
                            d.telefon
                            ? `📞 ${d.telefon}<br>`
                            : ""
                        }

                        ${
                            d.email
                            ? `✉️ ${d.email}`
                            : ""
                        }

                    </div>

                </div>

            </div>

            <div
            id="edit_${type}_${key}"
            class="editBox">

                <div class="field">

                    <label>
                        ${
                            type==="geraete"
                            ? "Gerät"
                            : "Fahrzeug"
                        }
                    </label>

                    <input
                    id="${type}_name_${key}"
                    value="${
                        d.geraete ||
                        d.fahrzeug ||
                        ""
                    }">

                </div>

                <div class="field">

                    <label>Ort</label>

                    <input
                    id="${type}_ort_${key}"
                    value="${d.ort || ""}">

                </div>

                <div class="field">

                    <label>Adresse</label>

                    <input
                    id="${type}_adresse_${key}"
                    value="${d.adresse || ""}">

                </div>

                <div class="field">

                    <label>E-Mail</label>

                    <input
                    id="${type}_email_${key}"
                    value="${d.email || ""}">

                </div>

                <div class="field">

                    <label>Telefon</label>

                    <input
                    id="${type}_telefon_${key}"
                    value="${d.telefon || ""}">

                </div>

                <div class="field">

                    <label>Funk</label>

                    <input
                    id="${type}_funk_${key}"
                    value="${d.funk || ""}">

                </div>

                <div class="field">

                    <label>Stärke</label>

                    <input
                    id="${type}_staerke_${key}"
                    value="${d.staerke || ""}">

                </div>

                <div class="field">

                    <label>Lagerort</label>

                    <input
                    id="${type}_lager_${key}"
                    value="${d.lagerort || ""}">

                </div>

                <div class="field">

                    <label>Beladung</label>

                    <textarea
                    id="${type}_beladung_${key}">${
                        d.beladung || ""
                    }</textarea>

                </div>

                <div class="field">

                    <label>Bemerkung</label>

                    <textarea
                    id="${type}_bemerkung_${key}">${
                        d.bemerkung || ""
                    }</textarea>

                </div>

                <div class="actions">

                    <button
                    class="save"
                    onclick="saveEntry(
                        '${type}',
                        '${key}'
                    )">

                        Speichern

                    </button>

                    <button
                    class="cancel"
                    onclick="toggleEdit(
                        '${type}',
                        '${key}'
                    )">

                        Schließen

                    </button>

                    <button
                    class="delete"
                    onclick="deleteEntry(
                        '${type}',
                        '${key}'
                    )">

                        Löschen

                    </button>

                </div>

            </div>

        `;

        target.appendChild(card);

    });

}

/* EDIT */
window.toggleEdit = function(
    type,
    key
){

    let el =
        document.getElementById(
            `edit_${type}_${key}`
        );

    if(el.style.display === "block"){

        el.style.display = "none";

    }else{

        el.style.display = "block";

    }

};

/* SPEICHERN */
window.saveEntry = async function(
    type,
    key
){

    try{

        status.innerHTML =
            "💾 Speichere...";

        let neuerName =
            document.getElementById(
                `${type}_name_${key}`
            ).value.trim();

        let neueDaten = {

            ort:
                document.getElementById(
                    `${type}_ort_${key}`
                ).value.trim(),

            adresse:
                document.getElementById(
                    `${type}_adresse_${key}`
                ).value.trim(),

            email:
                document.getElementById(
                    `${type}_email_${key}`
                ).value.trim(),

            telefon:
                document.getElementById(
                    `${type}_telefon_${key}`
                ).value.trim(),

            funk:
                document.getElementById(
                    `${type}_funk_${key}`
                ).value.trim(),

            staerke:
                document.getElementById(
                    `${type}_staerke_${key}`
                ).value.trim(),

            lagerort:
                document.getElementById(
                    `${type}_lager_${key}`
                ).value.trim(),

            beladung:
                document.getElementById(
                    `${type}_beladung_${key}`
                ).value.trim(),

            bemerkung:
                document.getElementById(
                    `${type}_bemerkung_${key}`
                ).value.trim()

        };

        if(type === "geraete"){

            neueDaten.geraete =
                neuerName;

        }else{

            neueDaten.fahrzeug =
                neuerName;

        }

        let komplett = {

            ...(type === "geraete"
                ? geraeteData[key]
                : fahrzeugeData[key]),

            ...neueDaten

        };

        await update(
            ref(db,`${type}/${key}`),
            komplett
        );

        if(type === "geraete"){

            geraeteData[key] =
                komplett;

        }else{

            fahrzeugeData[key] =
                komplett;

        }

        document.getElementById(
            `edit_${type}_${key}`
        ).style.display = "none";

        renderAll();

        status.innerHTML =
            "✅ Gespeichert";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Speichern";

    }

};

/* LÖSCHEN */
window.deleteEntry = async function(
    type,
    key
){

    if(
        !confirm(
            "Wirklich löschen?"
        )
    ) return;

    try{

        await remove(
            ref(db,`${type}/${key}`)
        );

        status.innerHTML =
            "🗑️ Gelöscht";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Löschen";

    }

};

/* ZURÜCK */
window.back = function(){

    location.href = "index.html";

};

</script>

</body>
</html>
