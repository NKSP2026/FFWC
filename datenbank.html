<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Datenbank</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
    max-width:1300px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.search{
    flex:1;
    min-width:250px;
}

.search input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111318;
    color:white;
    font-size:15px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 18px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.back{
    background:#6b7280;
}

.logout{
    background:#f59e0b;
}

.save{
    background:#2563eb;
}

.delete{
    background:#dc2626;
}

.sectionTitle{
    margin-top:40px;
    margin-bottom:20px;
    font-size:28px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(400px,1fr));
    gap:20px;
}

.card{
    background:#111318;
    border-radius:18px;
    padding:20px;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:15px;
}

.field{
    margin-bottom:14px;
}

.field label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.field input,
.field textarea{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1c1f26;
    color:white;
}

.field textarea{
    min-height:100px;
    resize:vertical;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

.status{
    margin-top:20px;
    font-weight:bold;
    text-align:center;
}

@media(max-width:700px){

    .grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="page">

<div class="top">

    <div class="search">
        <input
        id="search"
        placeholder="Suche nach Fahrzeug, Gerät, Ort..."
        oninput="renderAll()">
    </div>

    <div class="buttons">

        <button class="back" onclick="back()">
            Zurück
        </button>

        <button class="logout" onclick="logout()">
            Logout
        </button>

    </div>

</div>

<div id="status" class="status"></div>

<h2 class="sectionTitle">Geräte</h2>

<div id="geraeteList" class="grid"></div>

<h2 class="sectionTitle">Fahrzeuge</h2>

<div id="fahrzeugeList" class="grid"></div>

</div>

<script type="module">

/* ZENTRALES FIREBASE */
import "./firebase.js";

let geraeteData = {};
let fahrzeugeData = {};

/* Geräte laden */
onValue(ref(db,"geraete"), snap=>{

    geraeteData = snap.val() || {};

    renderAll();

});

/* Fahrzeuge laden */
onValue(ref(db,"fahrzeuge"), snap=>{

    fahrzeugeData = snap.val() || {};

    renderAll();

});

/* Alles rendern */
window.renderAll = function(){

    let q =
        search.value.toLowerCase();

    renderSection(
        geraeteList,
        geraeteData,
        "geraete",
        q
    );

    renderSection(
        fahrzeugeList,
        fahrzeugeData,
        "fahrzeuge",
        q
    );
};

/* Bereich rendern */
function renderSection(
    target,
    data,
    type,
    q
){

    target.innerHTML = "";

    Object.entries(data).forEach(([key,d])=>{

        let text =
            JSON.stringify(d)
            .toLowerCase();

        if(q && !text.includes(q)) return;

        let card =
            document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            ${d.bild
                ? `<img src="${d.bild}">`
                : ""
            }

            <div class="field">
                <label>
                    ${
                        type==="geraete"
                        ? "Gerät"
                        : "Fahrzeug"
                    }
                </label>

                <input
                id="${type}_name_${key}"
                value="${
                    d.geraete ||
                    d.fahrzeug ||
                    ""
                }">
            </div>

            <div class="field">
                <label>Ort</label>

                <input
                id="${type}_ort_${key}"
                value="${d.ort || ""}">
            </div>

            <div class="field">
                <label>Adresse</label>

                <input
                id="${type}_adresse_${key}"
                value="${d.adresse || ""}">
            </div>

            <div class="field">
                <label>Telefon</label>
                
                <div class="field">
    <label>E-Mail</label>

    <input
    id="${type}_email_${key}"
    value="${d.email || ""}">
</div>

                <input
                id="${type}_telefon_${key}"
                value="${d.telefon || ""}">
            </div>

            <div class="field">
                <label>Funk</label>

                <input
                id="${type}_funk_${key}"
                value="${d.funk || ""}">
            </div>

            <div class="field">
                <label>Stärke</label>

                <input
                id="${type}_staerke_${key}"
                value="${d.staerke || ""}">
            </div>

            <div class="field">
                <label>Lagerort</label>

                <input
                id="${type}_lager_${key}"
                value="${d.lagerort || ""}">
            </div>

            <div class="field">
                <label>Beladung</label>

                <textarea
                id="${type}_beladung_${key}">${
                    d.beladung || ""
                }</textarea>
            </div>

            <div class="field">
                <label>Bemerkung</label>

                <textarea
                id="${type}_bemerkung_${key}">${
                    d.bemerkung || ""
                }</textarea>
            </div>

            <div class="actions">

                <button
                class="save"
                onclick="saveEntry(
                    '${type}',
                    '${key}'
                )">
                    Speichern
                </button>

                <button
                class="delete"
                onclick="deleteEntry(
                    '${type}',
                    '${key}'
                )">
                    Löschen
                </button>

            </div>

        `;

        target.appendChild(card);

    });

}

/* Speichern */
window.saveEntry = async function(
    type,
    key
){

    try{

        status.innerHTML =
            "Speichere...";

        let data = {

            ort:
                document.getElementById(
                    `${type}_ort_${key}`
                ).value,

            adresse:
                document.getElementById(
                    `${type}_adresse_${key}`
                ).value,

            telefon:
                document.getElementById(
                    `${type}_telefon_${key}`
                ).value,

            email:
    document.getElementById(
        `${type}_email_${key}`
    ).value,

            funk:
                document.getElementById(
                    `${type}_funk_${key}`
                ).value,

            staerke:
                document.getElementById(
                    `${type}_staerke_${key}`
                ).value,

            lagerort:
                document.getElementById(
                    `${type}_lager_${key}`
                ).value,

            beladung:
                document.getElementById(
                    `${type}_beladung_${key}`
                ).value,

            bemerkung:
                document.getElementById(
                    `${type}_bemerkung_${key}`
                ).value
        };

        if(type==="geraete"){

            data.geraete =
                document.getElementById(
                    `${type}_name_${key}`
                ).value;

        }else{

            data.fahrzeug =
                document.getElementById(
                    `${type}_name_${key}`
                ).value;
        }

        await update(
            ref(db,`${type}/${key}`),
            data
        );

        status.innerHTML =
            "✅ Gespeichert";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Speichern";

    }

};

/* Löschen */
window.deleteEntry = async function(
    type,
    key
){

    if(
        !confirm(
            "Wirklich löschen?"
        )
    ) return;

    try{

        await remove(
            ref(db,`${type}/${key}`)
        );

        status.innerHTML =
            "🗑️ Gelöscht";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Löschen";

    }

};

/* Zurück */
window.back = function(){

    location.href = "index.html";

};

</script>

</body>
</html>
