<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Datenbank</title>

<link rel="stylesheet" href="style.css">

<style>

/* ALLES SAUBER */
*{
    box-sizing:border-box;
    margin:0;
    padding:0;

    -webkit-tap-highlight-color:transparent;
}

body{
    background:black;
    font-family:Arial,sans-serif;
    color:white;
    overflow-x:hidden;
}

/* SEITE */
.page{
    width:95%;
    max-width:1400px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
}

/* TOP */
.top{
    display:flex;
    gap:20px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
}

/* SUCHE */
.search{
    flex:1;
    min-width:250px;
}

.search input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#111318;
    color:white;
    font-size:16px;
    outline:none;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 18px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.back{
    background:#6b7280;
}

.logout{
    background:#f59e0b;
}

.save{
    background:#2563eb;
}

.delete{
    background:#dc2626;
}

/* TITEL */
.sectionTitle{
    margin-top:40px;
    margin-bottom:20px;
    font-size:30px;
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(340px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#111318;
    border-radius:18px;
    overflow:hidden;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:14px;
    margin-bottom:15px;
}

/* TITEL IN KARTE */
.title{
    display:block;
    width:100%;

    background:#1c1f26;

    color:white;

    padding:14px;

    border-radius:12px;

    font-size:22px;
    font-weight:bold;

    margin-bottom:18px;

    overflow:hidden;
    word-break:break-word;

    position:relative;
    z-index:5;

    cursor:pointer;

    border:2px solid transparent;

    transition:0.2s;
}

.title:hover{
    border-color:#2563eb;
}

/* FELDER */
.field{
    margin-bottom:15px;
}

.field label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:white;
}

.field input,
.field textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#1c1f26;
    color:white;
    outline:none;
    font-size:15px;
}

.field textarea{
    min-height:100px;
    resize:vertical;
}

/* BUTTON LEISTE */
.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

/* STATUS */
.status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:white;
}

/* MOBILE */
@media(max-width:900px){

    .top{
        flex-direction:column;
        align-items:stretch;
    }

    .buttons{
        width:100%;
    }

    .buttons button{
        flex:1;
    }

}

</style>

</head>

<body>

<div class="page">

<div class="top">

    <div class="search">

        <input
        id="search"
        autocomplete="off"
        spellcheck="false"
        placeholder="Suche..."
        oninput="renderAll()">

    </div>

    <div class="buttons">

        <button
        class="back"
        onclick="back()">

            Zurück

        </button>

        <button
        class="logout"
        onclick="logout()">

            Logout

        </button>

    </div>

</div>

<div id="status" class="status"></div>

<h2 class="sectionTitle">
    Geräte
</h2>

<div
id="geraeteList"
class="grid">
</div>

<h2 class="sectionTitle">
    Fahrzeuge
</h2>

<div
id="fahrzeugeList"
class="grid">
</div>

</div>

<script type="module">

/* FIREBASE */
import "./firebase.js";

/* FIREBASE FUNKTIONEN */
import {

onValue,
ref,
update,
remove

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";


let geraeteData = {};
let fahrzeugeData = {};


/* GERÄTE LADEN */
onValue(ref(db,"geraete"), snap=>{

    geraeteData = snap.val() || {};

    renderAll();

});


/* FAHRZEUGE LADEN */
onValue(ref(db,"fahrzeuge"), snap=>{

    fahrzeugeData = snap.val() || {};

    renderAll();

});


/* ALLES RENDERN */
window.renderAll = function(){

    let q =
        document
        .getElementById("search")
        .value
        .toLowerCase();

    renderSection(
        document.getElementById("geraeteList"),
        geraeteData,
        "geraete",
        q
    );

    renderSection(
        document.getElementById("fahrzeugeList"),
        fahrzeugeData,
        "fahrzeuge",
        q
    );

};


/* BEREICH */
function renderSection(
    target,
    data,
    type,
    q
){

    target.innerHTML = "";

    Object.entries(data).forEach(([key,d])=>{

        let text =
            JSON.stringify(d)
            .toLowerCase();

        if(q && !text.includes(q)) return;

        let name =
            d.geraete ||
            d.fahrzeug ||
            "-";

        let card =
            document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div
            class="title"
            ondblclick="
                toggleEdit(
                    '${type}',
                    '${key}'
                )
            ">
                ${name}
            </div>

            <div
            id="edit_${type}_${key}"
            style="display:none;">

                ${
                    d.bild
                    ? `
                    <img src="${d.bild}">
                    `
                    : ""
                }

                <div class="field">

                    <label>
                        ${
                            type==="geraete"
                            ? "Gerät"
                            : "Fahrzeug"
                        }
                    </label>

                    <input
                    id="${type}_name_${key}"
                    value="${
                        d.geraete ||
                        d.fahrzeug ||
                        ""
                    }">

                </div>

                <div class="field">

                    <label>Ort</label>

                    <input
                    id="${type}_ort_${key}"
                    value="${d.ort || ""}">

                </div>

                <div class="field">

                    <label>Adresse</label>

                    <input
                    id="${type}_adresse_${key}"
                    value="${d.adresse || ""}">

                </div>

                <div class="field">

                    <label>E-Mail</label>

                    <input
                    id="${type}_email_${key}"
                    value="${d.email || ""}">

                </div>

                <div class="field">

                    <label>Telefon</label>

                    <input
                    id="${type}_telefon_${key}"
                    value="${d.telefon || ""}">

                </div>

                <div class="field">

                    <label>Funk</label>

                    <input
                    id="${type}_funk_${key}"
                    value="${d.funk || ""}">

                </div>

                <div class="field">

                    <label>Stärke</label>

                    <input
                    id="${type}_staerke_${key}"
                    value="${d.staerke || ""}">

                </div>

                <div class="field">

                    <label>Lagerort</label>

                    <input
                    id="${type}_lager_${key}"
                    value="${d.lagerort || ""}">

                </div>

                <div class="field">

                    <label>Beladung</label>

                    <textarea
                    id="${type}_beladung_${key}">${
                        d.beladung || ""
                    }</textarea>

                </div>

                <div class="field">

                    <label>Bemerkung</label>

                    <textarea
                    id="${type}_bemerkung_${key}">${
                        d.bemerkung || ""
                    }</textarea>

                </div>

                <div class="actions">

                    <button
                    class="save"
                    onclick="saveEntry(
                        '${type}',
                        '${key}'
                    )">

                        Speichern

                    </button>

                    <button
                    class="delete"
                    onclick="deleteEntry(
                        '${type}',
                        '${key}'
                    )">

                        Löschen

                    </button>

                </div>

            </div>

        `;

        target.appendChild(card);

    });

}


/* ÖFFNEN */
window.toggleEdit = function(
    type,
    key
){

    let el =
        document.getElementById(
            `edit_${type}_${key}`
        );

    if(el.style.display === "none"){

        el.style.display = "block";

    }else{

        el.style.display = "none";

    }

};


/* SPEICHERN */
window.saveEntry = async function(
    type,
    key
){

    try{

        status.innerHTML =
            "Speichere...";

        let data = {

            ort:
                document.getElementById(
                    `${type}_ort_${key}`
                ).value,

            adresse:
                document.getElementById(
                    `${type}_adresse_${key}`
                ).value,

            email:
                document.getElementById(
                    `${type}_email_${key}`
                ).value,

            telefon:
                document.getElementById(
                    `${type}_telefon_${key}`
                ).value,

            funk:
                document.getElementById(
                    `${type}_funk_${key}`
                ).value,

            staerke:
                document.getElementById(
                    `${type}_staerke_${key}`
                ).value,

            lagerort:
                document.getElementById(
                    `${type}_lager_${key}`
                ).value,

            beladung:
                document.getElementById(
                    `${type}_beladung_${key}`
                ).value,

            bemerkung:
                document.getElementById(
                    `${type}_bemerkung_${key}`
                ).value

        };

        if(type==="geraete"){

            data.geraete =
                document.getElementById(
                    `${type}_name_${key}`
                ).value;

        }else{

            data.fahrzeug =
                document.getElementById(
                    `${type}_name_${key}`
                ).value;

        }

        await update(
            ref(db,`${type}/${key}`),
            data
        );

        status.innerHTML =
            "✅ Gespeichert";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Speichern";

    }

};


/* LÖSCHEN */
window.deleteEntry = async function(
    type,
    key
){

    if(
        !confirm(
            "Wirklich löschen?"
        )
    ) return;

    try{

        await remove(
            ref(db,`${type}/${key}`)
        );

        status.innerHTML =
            "🗑️ Gelöscht";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Löschen";

    }

};


/* ZURÜCK */
window.back = function(){

    location.href = "index.html";

};

</script>

</body>
</html>
