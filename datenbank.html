<!DOCTYPE html>
<html lang="de">
<body>

<input type="password" id="pw">
<button onclick="openDB()">Öffnen</button>

<div id="content"></div>

<script type="module">
import "./firebase.js";

window.openDB=function(){
 if(pw.value!=="1234") return;

 onValue(ref(db,"daten"), snap=>{
    let html="";
    Object.values(snap.val()||{}).forEach(d=>{
        html+=`${d.ort} - ${d.fahrzeug}<br>`;
    });
    content.innerHTML=html;
 });
}
</script>

</body>
</html>
