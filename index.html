<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Landfunkstelle Crimmitschau</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <div class="background"></div>

    <h1 class="title">
        Ortsfeste Landfunkstelle<br>
        Crimmitschau
    </h1>

    <img src="wappen.png" class="wappen">

    <div class="menu">
        <button class="delete" onclick="go('loeschen.html')">Löschen</button>
        <button onclick="go('neu.html')">Neu Anlegen</button>
        <button onclick="go('suche_geraete.html')">Einsatz-/ Sondergerät Suche</button>
        <button onclick="go('suche_fahrzeug.html')">Fahrzeug Suche</button>
        <button onclick="go('mail.html')">Mail</button>
        <button onclick="go('protokolle.html')">Protokolle</button>
        <button onclick="go('datenbank.html')">Datenbank öffnen</button>

        <!-- 🔥 NEU: Logout -->
        <button onclick="logout()" style="
            margin-top:15px;
            background: linear-gradient(to bottom, #6b7280, #374151);
            color: white;
        ">
            Logout
        </button>
    </div>

</div>

<script>

/* 🔐 Login Check */
if(localStorage.getItem("login") !== "ok"){
    window.location.href = "login.html";
}

/* Navigation */
function go(x){
    window.location.href = x;
}

/* 🔓 Logout */
function logout(){
    localStorage.removeItem("login");
    window.location.href = "login.html";
}

</script>

</body>
</html>
