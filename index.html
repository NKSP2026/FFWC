<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Landfunkstelle Crimmitschau</title>

<style>

/* Grund */
body {
    margin: 0;
    font-family: Arial;
    background: black;
}

/* Container */
.container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

/* Hintergrund */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("bg.jpg") no-repeat center;
    background-size: contain;
}

/* Titel (15% nach links) */
.title {
    position: absolute;
    top: 8%;
    left: 17%;   /* vorher ~32% → -15% */
    font-size: clamp(28px, 4vw, 60px);
    font-weight: bold;
    color: #ff6b6b;
    text-shadow: 4px 4px 12px black;
}

/* Wappen */
.wappen {
    position: absolute;
    top: 3%;
    right: 2%;
    width: clamp(260px, 30vw, 550px);
}

/* Menü (10% weiter runter) */
.menu {
    position: absolute;
    top: 60%;   /* vorher 50% → +10% runter */
    right: 24%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* Buttons */
.menu button {
    width: clamp(220px, 20vw, 360px);
    padding: clamp(10px, 1.5vw, 18px);
    font-size: clamp(14px, 1.2vw, 22px);
    font-weight: bold;
    color: black;

    border-radius: 12px;
    border: 1px solid #2c3e50;

    background: linear-gradient(to bottom, #7fa6bd, #4a6a7d);

    box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.6),
        0 8px 0 #2c3e50,
        0 12px 15px rgba(0,0,0,0.8);

    cursor: pointer;
    transition: all 0.15s ease;
}

/* Hover */
.menu button:hover {
    transform: translateY(-3px);
}

/* Klick */
.menu button:active {
    transform: translateY(6px);
    box-shadow:
        inset 0 4px 10px rgba(0,0,0,0.7),
        0 2px 0 #2c3e50,
        0 4px 6px rgba(0,0,0,0.7);
}

/* Löschen */
.delete {
    background: linear-gradient(to bottom, #ff4d4d, #b30000) !important;
    box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.4),
        0 8px 0 #660000,
        0 12px 15px rgba(0,0,0,0.9);
}

/* Mobile */
@media (max-width: 768px) {

    .title {
        left: 8%;
        font-size: 28px;
    }

    .wappen {
        width: 200px;
    }

    .menu {
        top: 65%;
        right: 10%;
        transform: none;
    }

    .menu button {
        width: 220px;
        font-size: 14px;
    }
}

</style>

</head>
<body>

<div class="container">

    <div class="background"></div>

    <h1 class="title">
        Ortsfeste Landfunkstelle<br>
        Crimmitschau
    </h1>

    <img src="wappen.png" class="wappen">

    <div class="menu">
        <button class="delete">Löschen</button>
        <button onclick="go('neu.html')">Neu Anlegen</button>
        <button onclick="go('suche_geraete.html')">Einsatz-/ Sondergerät Suche</button>
        <button onclick="go('suche_fahrzeug.html')">Fahrzeug Suche</button>
        <button onclick="go('protokolle.html')">Protokolle öffnen</button>
        <button onclick="go('datenbank.html')">Datenbank öffnen</button>
    </div>

</div>

<script>
function go(x){
    window.location.href = x;
}
</script>

</body>
</html>
