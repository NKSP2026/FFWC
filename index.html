<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Landfunkstelle Crimmitschau</title>

<style>

/* Grund */
body {
    margin: 0;
    font-family: Arial;
    background: black;
}

/* Container */
.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* Hintergrund */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("bg.jpg") no-repeat center;
    background-size: 80%;
}

/* Titel */
.title {
    position: absolute;
    top: 60px;
    left: 80px;
    font-size: 60px;
    font-weight: bold;
    color: #ff6b6b;
    text-shadow: 3px 3px 10px black;
}

/* Wappen */
.wappen {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 385px; /* +10% größer */
}

/* Menü */
.menu {
    position: absolute;
    top: 260px;   /* weiter runter */
    right: 80px;  /* weiter links */
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Buttons */
.menu button {
    width: 350px;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    color: black;

    border-radius: 10px;
    border: 1px solid #2c3e50;

    background: linear-gradient(to bottom, #6f8fa1, #4a6a7d);

    box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.4),
        0 6px 0 #2c3e50,
        0 8px 10px rgba(0,0,0,0.6);

    cursor: pointer;
    transition: all 0.1s ease;
}

/* Hover */
.menu button:hover {
    transform: translateY(-2px);
}

/* Klick Effekt */
.menu button:active {
    transform: translateY(4px);

    box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.6),
        0 2px 0 #2c3e50,
        0 4px 6px rgba(0,0,0,0.6);
}

/* Löschen Button */
.delete {
    background: linear-gradient(to bottom, #ff4d4d, #b30000) !important;

    box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.3),
        0 6px 0 #660000,
        0 8px 10px rgba(0,0,0,0.8);
}

</style>

</head>
<body>

<div class="container">

    <div class="background"></div>

    <h1 class="title">
        Ortsfeste Landfunkstelle<br>
        Crimmitschau
    </h1>

    <img src="wappen.png" class="wappen">

    <div class="menu">
        <button class="delete">Löschen</button>
        <button onclick="go('neu.html')">Neu Anlegen</button>
        <button onclick="go('suche_geraete.html')">Einsatz-/ Sondergerät Suche</button>
        <button onclick="go('suche_fahrzeug.html')">Fahrzeug Suche</button>
        <button onclick="go('protokolle.html')">Protokolle öffnen</button>
        <button onclick="go('datenbank.html')">Datenbank öffnen</button>
    </div>

</div>

<script>
function go(x){
    window.location.href = x;
}
</script>

</body>
</html>
