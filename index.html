<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Landfunkstelle Crimmitschau</title>

<style>

/* Grund */
body {
    margin: 0;
    font-family: Arial;
    background: black;
}

/* Container */
.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* Hintergrund */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("bg.jpg") no-repeat center;
    background-size: 80%;
}

/* Titel (weiter nach rechts ins Bild) */
.title {
    position: absolute;
    top: 80px;
    left: 180px;   /* 🔥 weiter ins Bild */
    font-size: 60px;
    font-weight: bold;
    color: #ff6b6b;
    text-shadow: 4px 4px 12px black;
}

/* Wappen (+20% größer) */
.wappen {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 420px;   /* 🔥 größer */
}

/* Menü (weiter runter + nach links) */
.menu {
    position: absolute;
    top: 340px;   /* 🔥 weiter runter */
    right: 140px; /* 🔥 weiter nach links */
    display: flex;
    flex-direction: column;
    gap: 22px;
}

/* Buttons (ECHTER 3D LOOK) */
.menu button {
    width: 360px;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    color: black;

    border-radius: 12px;
    border: 1px solid #2c3e50;

    background: linear-gradient(to bottom, #7fa6bd, #4a6a7d);

    /* 🔥 echter 3D Effekt */
    box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.6),
        0 8px 0 #2c3e50,
        0 12px 15px rgba(0,0,0,0.8);

    cursor: pointer;
    transition: all 0.15s ease;
}

/* Hover */
.menu button:hover {
    transform: translateY(-3px);
}

/* Klick (drücken Effekt) */
.menu button:active {
    transform: translateY(6px);

    box-shadow:
        inset 0 4px 10px rgba(0,0,0,0.7),
        0 2px 0 #2c3e50,
        0 4px 6px rgba(0,0,0,0.7);
}

/* Löschen Button */
.delete {
    background: linear-gradient(to bottom, #ff4d4d, #b30000) !important;

    box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.4),
        0 8px 0 #660000,
        0 12px 15px rgba(0,0,0,0.9);
}

</style>

</head>
<body>

<div class="container">

    <div class="background"></div>

    <h1 class="title">
        Ortsfeste Landfunkstelle<br>
        Crimmitschau
    </h1>

    <img src="wappen.png" class="wappen">

    <div class="menu">
        <button class="delete">Löschen</button>
        <button onclick="go('neu.html')">Neu Anlegen</button>
        <button onclick="go('suche_geraete.html')">Einsatz-/ Sondergerät Suche</button>
        <button onclick="go('suche_fahrzeug.html')">Fahrzeug Suche</button>
        <button onclick="go('protokolle.html')">Protokolle öffnen</button>
        <button onclick="go('datenbank.html')">Datenbank öffnen</button>
    </div>

</div>

<script>
function go(x){
    window.location.href = x;
}
</script>

</body>
</html>
