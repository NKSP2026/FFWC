<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Landfunkstelle Crimmitschau</title>

<style>

/* Hintergrund */
body {
    margin: 0;
    font-family: Arial;
    background: black;
}

/* Container */
.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* Hintergrundbild */
.background {
    position: absolute;
    width: 100%;
    height: 100%;

    background: url("bg.jpg") no-repeat center;
    background-size: 80%;   /* 🔥 kleiner gemacht */
}

/* Titel */
.title {
    position: absolute;
    top: 60px;
    left: 80px;
    font-size: 60px;
    font-weight: bold;
    color: #ff6b6b;
    text-shadow: 3px 3px 10px black;
}

/* Wappen */
.wappen {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 350px;   /* 🔥 deutlich größer */
}

/* Menü */
.menu {
    position: absolute;
    top: 200px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Buttons */
.menu button {
    width: 350px;            /* 🔥 größer */
    padding: 18px;
    font-size: 22px;         /* 🔥 größer */
    font-weight: bold;
    color: black;            /* 🔥 schwarz */
    border: none;
    border-radius: 10px;
    background: #4a6a7d;
    cursor: pointer;
}

/* Hover */
.menu button:hover {
    background: #5f859c;
}

/* Löschen */
.delete {
    background: red !important;
    color: black !important;
}

</style>

</head>
<body>

<div class="container">

    <div class="background"></div>

    <h1 class="title">
        Ortsfeste Landfunkstelle<br>
        Crimmitschau
    </h1>

    <img src="wappen.png" class="wappen">

    <div class="menu">
        <button class="delete">Löschen</button>
        <button onclick="go('neu.html')">Neu Anlegen</button>
        <button onclick="go('suche_geraete.html')">Einsatz-/ Sondergerät Suche</button>
        <button onclick="go('suche_fahrzeug.html')">Fahrzeug Suche</button>
        <button onclick="go('protokolle.html')">Protokolle öffnen</button>
        <button onclick="go('datenbank.html')">Datenbank öffnen</button>
    </div>

</div>

<script>
function go(x){
    window.location.href = x;
}
</script>

</body>
</html>
