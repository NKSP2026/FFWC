<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daten löschen</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
    max-width:1200px;
    margin:40px auto;
    background:#1c1f26;
    padding:30px;
    border-radius:20px;
}

.top{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

select,
input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111318;
    color:white;
    font-size:15px;
}

.list{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#111318;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:20px;
}

.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.info{
    margin-bottom:10px;
    line-height:1.5;
}

.actions{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 18px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.delete{
    background:#dc2626;
}

.back{
    background:#6b7280;
}

.logout{
    background:#f59e0b;
}

.status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.bottom{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
}

@media(max-width:900px){

    .top{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="page">

<h2>Daten löschen</h2>

<div class="top">

    <div class="box">

        <label>Typ</label>

        <select id="typ" onchange="loadData()">

            <option value="">
                Bitte wählen
            </option>

            <option value="geraete">
                Geräte
            </option>

            <option value="fahrzeuge">
                Fahrzeuge
            </option>

        </select>

    </div>

    <div class="box">

    <label>Ort</label>

    <input
    id="ort"
    list="ortListe"
    placeholder="Ort wählen"
    onchange="nextStep()">

    <datalist id="ortListe"></datalist>

</div>

   <div class="box" id="lagerBox">

    <label>Lagerort</label>

    <input
    id="lager"
    list="lagerListe"
    placeholder="Lagerort wählen"
    onchange="loadItems()">

    <datalist id="lagerListe"></datalist>

</div>

</div>

<div class="box">

    <label>Suche</label>

    <input
    id="search"
    placeholder="Suche..."
    oninput="filterList()">

</div>

<div id="status" class="status"></div>

<div id="liste" class="list"></div>

<div class="bottom">

    <button class="back" onclick="back()">
        Zurück
    </button>

    <button class="logout" onclick="logout()">
        Logout
    </button>

</div>

</div>

<script type="module">

/* ZENTRALES FIREBASE */
import "./firebase.js";

let rawData = {};
let currentItems = [];

/* Daten laden */
window.loadData = function(){

    let type = typ.value;

    if(!type) return;

    status.innerHTML =
        "Lade Daten...";

    onValue(ref(db,type), snap=>{

        rawData = snap.val() || {};

        let orte = new Set();

        Object.values(rawData).forEach(d=>{

            if(d.ort){

                orte.add(d.ort);

            }

        });

        ortListe.innerHTML = "";

        [...orte]
.sort()
.forEach(o=>{

    ortListe.innerHTML += `
        <option value="${o}">
    `;

});

        liste.innerHTML = "";

        lagerListe.innerHTML = "";

        status.innerHTML =
            "✅ Daten geladen";

    });

};

/* Schrittlogik */
window.nextStep = function(){

    if(typ.value === "fahrzeuge"){

        lagerBox.style.display =
            "none";

        loadItems();

    }else{

        lagerBox.style.display =
            "block";

        loadLagerorte();

    }

};

/* Lagerorte */
window.loadLagerorte = function(){

    let set = new Set();

    Object.values(rawData).forEach(d=>{

       if(
    d.ort?.trim().toLowerCase() ===
    ort.value.trim().toLowerCase()

    &&

    d.lagerort?.trim().toLowerCase() ===
    lager.value.trim().toLowerCase()
)

    });

    lager.innerHTML =
        "<option value=''>Lagerort wählen</option>";

    [...set]
.sort()
.forEach(l=>{

    lagerListe.innerHTML += `
        <option value="${l}">
    `;

});

};

/* Elemente laden */
window.loadItems = function(){

    currentItems = [];

    Object.entries(rawData).forEach(([key,d])=>{

        if(typ.value === "fahrzeuge"){

            if(
    d.ort?.trim().toLowerCase() ===
    ort.value.trim().toLowerCase()
){

                currentItems.push({
                    key,
                    d
                });

            }

        }else{

            if(
                d.ort === ort.value &&
                d.lagerort === lager.value
            ){

                currentItems.push({
                    key,
                    d
                });

            }

        }

    });

    renderList(currentItems);

};

/* Filter */
window.filterList = function(){

    let q =
        search.value.toLowerCase();

    let filtered =
        currentItems.filter(item=>{

            return JSON.stringify(item.d)
            .toLowerCase()
            .includes(q);

        });

    renderList(filtered);

};

/* Anzeige */
function renderList(items){

    liste.innerHTML = "";

    if(items.length === 0){

        liste.innerHTML = `
            <div class="status">
                Keine Daten gefunden
            </div>
        `;

        return;
    }

    items.forEach(item=>{

        let d = item.d;

        let name =
            d.geraete ||
            d.fahrzeug ||
            "-";

        let div =
            document.createElement("div");

        div.className = "card";

        div.innerHTML = `

            ${d.bild
                ? `<img src="${d.bild}">`
                : ""
            }

            <div class="content">

                <div class="title">
                    ${name}
                </div>

                <div class="info">
                    <b>Ort:</b>
                    ${d.ort || "-"}
                </div>

                <div class="info">
                    <b>Adresse:</b>
                    ${d.adresse || "-"}
                </div>

                <div class="info">
                    <b>Telefon:</b>
                    ${d.telefon || "-"}
                </div>

                ${
                    d.lagerort
                    ? `
                    <div class="info">
                        <b>Lagerort:</b>
                        ${d.lagerort}
                    </div>
                    `
                    : ""
                }

                ${
                    d.funk
                    ? `
                    <div class="info">
                        <b>Funk:</b>
                        ${d.funk}
                    </div>
                    `
                    : ""
                }

                <div class="actions">

                    <button
                    class="delete"
                    onclick="deleteEntry(
                        '${item.key}'
                    )">

                        Löschen

                    </button>

                </div>

            </div>

        `;

        liste.appendChild(div);

    });

}

/* Löschen */
window.deleteEntry = async function(key){

    if(
        !confirm(
            "Wirklich löschen?"
        )
    ) return;

    try{

        status.innerHTML =
            "Lösche...";

        await remove(
            ref(
                db,
                typ.value + "/" + key
            )
        );

        status.innerHTML =
            "🗑️ Gelöscht";

    }catch(e){

        console.error(e);

        status.innerHTML =
            "❌ Fehler beim Löschen";

    }

};

/* Zurück */
window.back = function(){

    location.href = "index.html";

};

</script>

</body>
</html>
