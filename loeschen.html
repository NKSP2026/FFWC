<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Löschen</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: #0f1117; 
    color: white;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    background: #1c1f26;
    padding: 30px;
    border-radius: 15px;
}

h2 {
    margin-bottom: 20px;
}

.box {
    margin-bottom: 20px;
}

select, input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    background: #111318;
    color: white;
    border: none;
}

.list {
    margin-top: 20px;
    display: grid;
    gap: 10px;
}

.item {
    background: #111318;
    padding: 12px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.delete {
    background: #ef4444;
}

.back {
    margin-top: 20px;
    background: #3b82f6;
}
</style>
</head>

<body>

<div class="container">

<h2>Daten löschen</h2>

<!-- Typ -->
<div class="box">
    <label>Was löschen?</label>
    <select id="typ" onchange="loadData()">
        <option value="">Bitte wählen</option>
        <option value="geraete">Geräte</option>
        <option value="fahrzeuge">Fahrzeuge</option>
    </select>
</div>

<!-- Ort -->
<div class="box">
    <label>Ort</label>
    <select id="ort" onchange="nextStep()"></select>
</div>

<!-- Lagerort -->
<div class="box" id="lagerBox">
    <label>Lagerort</label>
    <select id="lager" onchange="loadItems()"></select>
</div>

<!-- Suche -->
<div class="box">
    <label>Suche</label>
    <input id="search" oninput="filterList()" placeholder="z.B. Schlauch, HLF...">
</div>

<!-- Liste -->
<div id="liste" class="list"></div>

<button class="back" onclick="back()">Zurück</button>

</div>

<script type="module">

/* 🔒 LOGIN CHECK */
if(localStorage.getItem("login") !== "ok"){
    window.location.href = "login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://ffwc-d3994-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = getDatabase(app);

let rawData = {};
let currentItems = [];

/* HTML */
const typSelect = document.getElementById("typ");
const ortSelect = document.getElementById("ort");
const lagerSelect = document.getElementById("lager");
const lagerBox = document.getElementById("lagerBox");
const liste = document.getElementById("liste");

/* 🔥 DATEN LADEN */
window.loadData = function(){

    let typ = typSelect.value;
    if(!typ) return;

    onValue(ref(db, typ), snap => {

        rawData = snap.val() || {};

        let orte = new Set();

        Object.values(rawData).forEach(d=>{
            if(d.ort) orte.add(d.ort);
        });

        ortSelect.innerHTML = "<option value=''>Ort wählen</option>";

        orte.forEach(o=>{
            ortSelect.innerHTML += `<option>${o}</option>`;
        });

        liste.innerHTML = "";
        lagerSelect.innerHTML = "";
    });
};

/* 🔥 SCHRITT LOGIK */
window.nextStep = function(){

    let typ = typSelect.value;

    if(typ === "fahrzeuge"){
        lagerBox.style.display = "none";
        loadItems();
    } else {
        lagerBox.style.display = "block";
        loadLagerorte();
    }
};

/* 🔥 LAGERORTE */
window.loadLagerorte = function(){

    let ort = ortSelect.value;

    let lagerSet = new Set();

    Object.values(rawData).forEach(d=>{
        if(d.ort === ort && d.lagerort){
            lagerSet.add(d.lagerort);
        }
    });

    lagerSelect.innerHTML = "<option value=''>Lagerort wählen</option>";

    lagerSet.forEach(l=>{
        lagerSelect.innerHTML += `<option>${l}</option>`;
    });
};

/* 🔥 ITEMS */
window.loadItems = function(){

    let typ = typSelect.value;
    let ort = ortSelect.value;
    let lager = lagerSelect.value;

    currentItems = [];

    Object.entries(rawData).forEach(([key, d])=>{

        if(typ === "fahrzeuge"){
            if(d.ort === ort){
                currentItems.push({key, d});
            }
        } else {
            if(d.ort === ort && d.lagerort === lager){
                currentItems.push({key, d});
            }
        }
    });

    renderList(currentItems);
};

/* 🔍 FILTER */
window.filterList = function(){

    let s = search.value.toLowerCase();

    let filtered = currentItems.filter(item => {

        let name = (item.d.geraete || item.d.fahrzeug || "").toLowerCase();
        return name.includes(s);
    });

    renderList(filtered);
};

/* 🔥 ANZEIGE */
function renderList(items){

    liste.innerHTML = "";

    items.forEach(item => {

        let name = item.d.geraete || item.d.fahrzeug || "-";

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <span>${name}</span>
            <button class="delete" onclick="del('${item.key}')">Löschen</button>
        `;

        liste.appendChild(div);
    });
}

/* 🔥 DELETE */
window.del = function(key){

    let typ = typSelect.value;

    if(confirm("Wirklich löschen?")){
        remove(ref(db, typ + "/" + key));
    }
};

/* 🔙 BACK */
window.back = function(){
    window.location.href = "index.html";
};

</script>

</body>
</html>
